<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="appTitle">🍼 奶粉沖泡計算機 (10倍數)</title>
    <style>
        /* 基礎樣式與手機優化 - 親子向粉藍漸變背景 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #E8F4F8 0%, #F5E6F3 50%, #FFF0F5 100%);
            background-attachment: fixed;
            color: #2C3E50; /* 深灰色文字確保可讀性 */
            min-height: 100vh;
            position: relative;
        }

        /* 添加裝飾性雲朵背景（可選） */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .calculator-container {
            background: rgba(255, 255, 255, 0.25); /* 半透明白色毛玻璃背景 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px;
            padding-top: 20px;
            border-radius: 24px; /* 增加圓角 */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), 
                        0 2px 8px rgba(0, 0, 0, 0.05),
                        inset 0 1px 0 rgba(255, 255, 255, 0.5); /* 柔和陰影 + 內光 */
            border: 1px solid rgba(255, 255, 255, 0.3); /* 半透明邊框 */
            position: relative;
            max-width: 100%;
            margin: 0 auto;
            z-index: 1;
        }

        /* 語言切換按鈕樣式 - 毛玻璃效果 */
        #language-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            
            padding: 8px 15px; 
            font-size: 0.85em; 
            
            background: rgba(255, 184, 77, 0.3); /* 溫暖橙色半透明 */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #2C3E50;
            border: 1px solid rgba(255, 184, 77, 0.5);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        #language-toggle:hover {
            background: rgba(255, 184, 77, 0.5);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 184, 77, 0.3);
        }

        /* 標題樣式 - 漸變文字效果 */
        h1 {
            background: linear-gradient(135deg, #FF9EC7 0%, #FFB84D 50%, #FF9EC7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-top: 20px; 
            margin-bottom: 30px; 
            font-size: 1.8em;
            padding-right: 70px;
            padding-left: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* 說明區塊樣式 - 毛玻璃效果 */
        .info-section {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .info-toggle {
            background: linear-gradient(135deg, #FF9EC7 0%, #FFB84D 100%);
            color: #2C3E50;
            border: none;
            border-radius: 12px;
            padding: 10px 18px;
            font-size: 0.95em;
            cursor: pointer;
            width: 100%;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(255, 158, 199, 0.3);
        }

        .info-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 158, 199, 0.4);
        }

        .info-toggle::after {
            content: '▼';
            font-size: 0.8em;
            transition: transform 0.3s;
        }

        .info-toggle.expanded::after {
            transform: rotate(180deg);
        }

        .info-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            margin-top: 0;
        }

        .info-content.expanded {
            max-height: 1000px;
            margin-top: 15px;
        }

        .info-content p {
            margin: 10px 0;
            line-height: 1.6;
            color: #2C3E50;
            font-size: 0.95em;
        }

        .info-content strong {
            color: #FF9EC7;
            font-weight: 700;
        }

        .info-content ul {
            margin: 10px 0;
            padding-left: 20px;
            color: #2C3E50;
        }

        .info-content li {
            margin: 8px 0;
            line-height: 1.6;
        }

        /* 欄位群組 */
        .form-group {
            margin-bottom: 20px;
        }

        /* 標籤樣式 - 溫暖色調 */
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 1.1em;
            color: #2C3E50;
        }

        /* 下拉式選單樣式 - 毛玻璃效果 */
        select {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1.1em;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #2C3E50;
            min-height: 48px; 
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        select:focus {
            outline: none;
            border-color: rgba(255, 158, 199, 0.6);
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 12px rgba(255, 158, 199, 0.2);
            transform: translateY(-1px);
        }
        
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 1em;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #FF9EC7; /* 粉色箭頭 */
            font-weight: bold;
        }

        /* 計算按鈕樣式 - 漸變背景 + 毛玻璃效果 */
        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn) { 
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF9EC7 0%, #FFB84D 100%);
            color: #2C3E50;
            border: none;
            border-radius: 16px;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 16px rgba(255, 158, 199, 0.3);
            position: relative;
            overflow: hidden;
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn)::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn):hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 158, 199, 0.4);
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn):hover::before {
            left: 100%;
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn):active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(255, 158, 199, 0.3);
        }

        /* 結果顯示區 - 毛玻璃卡片設計 */
        #result_area {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            min-height: 100px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #result_area p {
            font-size: 1.1em;
            font-weight: 600;
            margin: 10px 0;
            color: #2C3E50;
        }
        #result_area strong {
            font-size: 1.5em;
            color: #E91E63; /* 更深的粉紅色，提高對比度 */
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(233, 30, 99, 0.2);
            letter-spacing: 0.5px;
        }

        /* 冷水提示樣式 - 改為懸停顯示 */
        .cold-water-warning {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            padding: 4px 10px;
            background: rgba(255, 184, 77, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #FFB84D;
            font-size: 0.9em;
            font-weight: 600;
            border-radius: 12px;
            border: 1px solid rgba(255, 184, 77, 0.3);
            cursor: help;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 2px 6px rgba(255, 184, 77, 0.15);
            line-height: 1.2;
        }

        .cold-water-warning:hover {
            background: rgba(255, 184, 77, 0.25);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 184, 77, 0.25);
        }

        .cold-water-warning::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 8px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #2C3E50;
            font-size: 0.9em;
            border-radius: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 184, 77, 0.3);
        }

        .cold-water-warning:hover::after {
            opacity: 1;
        }

        /* 結果操作按鈕樣式 */
        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .result-action-btn {
            padding: 10px 18px;
            background: rgba(255, 184, 77, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #2C3E50;
            border: 1px solid rgba(255, 184, 77, 0.5);
            border-radius: 12px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(255, 184, 77, 0.2);
        }

        .result-action-btn:hover {
            background: rgba(255, 184, 77, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 184, 77, 0.3);
        }

        .result-action-btn:active {
            transform: translateY(0);
        }

        .copy-success-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #2C3E50;
            padding: 14px 24px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            z-index: 10000;
            animation: slideIn 0.3s ease-out;
            border: 1px solid rgba(255, 158, 199, 0.3);
            font-weight: 600;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 響應式設計 - 電腦版 (平板和桌面) */
        @media (min-width: 768px) {
            body {
                padding: 40px;
            }

            .calculator-container {
                max-width: 600px;
                padding: 35px;
                padding-top: 30px;
                border-radius: 28px;
            }

            h1 {
                font-size: 2.2em;
                margin-bottom: 40px;
            }

            label {
                font-size: 1.2em;
            }

            select {
                font-size: 1.15em;
                padding: 14px 12px;
            }

            button:not(#language-toggle) {
                font-size: 1.3em;
                padding: 18px;
            }

            #result_area {
                padding: 20px;
                min-height: 120px;
            }

            #result_area p {
                font-size: 1.2em;
            }

            #result_area strong {
                font-size: 1.7em;
            }

            .cold-water-warning {
                font-size: 0.95em;
                padding: 5px 12px;
                margin-left: 10px;
            }
        }

        /* 響應式設計 - 手機版 */
        @media (max-width: 767px) {
            body {
                padding: 15px;
            }

            .calculator-container {
                padding: 20px;
                padding-top: 60px; /* 為語言切換按鈕留出空間 */
                border-radius: 10px;
            }

            /* 語言切換按鈕在手機上的調整 */
            #language-toggle {
                top: 15px;
                right: 15px;
                padding: 8px 12px;
                font-size: 0.9em;
            }

            h1 {
                font-size: 1.5em;
                margin-top: 10px;
                margin-bottom: 25px;
                padding-right: 80px; /* 為語言按鈕留出空間 */
                padding-left: 0;
            }

            .form-group {
                margin-bottom: 18px;
            }

            label {
                font-size: 1em;
                margin-bottom: 6px;
            }

            select {
                font-size: 1em;
                padding: 14px 10px;
                min-height: 48px; /* 確保觸控友善 */
            }

            button:not(#language-toggle) {
                font-size: 1.1em;
                padding: 16px;
                margin-top: 15px;
            }

            #result_area {
                margin-top: 25px;
                padding: 15px;
                min-height: 90px;
            }

            #result_area p {
                font-size: 1em;
                margin: 8px 0;
            }

            #result_area strong {
                font-size: 1.4em;
            }

            .cold-water-warning {
                font-size: 0.85em;
                padding: 4px 10px;
                margin-left: 6px;
            }
        }

        /* 超小螢幕手機 (小於 360px) */
        @media (max-width: 359px) {
            body {
                padding: 10px;
            }

            .calculator-container {
                padding: 15px;
                padding-top: 55px;
            }

            h1 {
                font-size: 1.3em;
                padding-right: 70px;
            }

            label {
                font-size: 0.95em;
            }

            select {
                font-size: 0.95em;
            }

            button:not(#language-toggle) {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        
        <button id="language-toggle" onclick="switchLanguage()">English</button>

        <h1 id="mainTitle">👶 奶粉沖泡水量計算 (10ml 單位)</h1>

        <!-- 說明與引導區塊 -->
        <div class="info-section">
            <button class="info-toggle" id="infoToggle" onclick="toggleInfo()">
                <span id="infoToggleText">📖 使用說明與常見問題</span>
            </button>
            <div class="info-content" id="infoContent">
                <div id="infoContentText">
                    <!-- 內容將由 JavaScript 動態填入 -->
                </div>
            </div>
        </div>

        <div class="form-group">
            <label id="labelMilkAmount" for="milk_amount">總奶量 (ml):</label>
            <div class="select-wrapper">
                <select id="milk_amount" name="milk_amount">
                    <option value="120">120 ml</option>
                    <option value="150">150 ml</option>
                    <option value="180" selected>180 ml</option>
                    <option value="210">210 ml</option>
                    <option value="240">240 ml</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label id="labelHotWater" for="hot_water_temp">熱水溫度 (℃):</label>
            <div class="select-wrapper">
                <select id="hot_water_temp" name="hot_water_temp">
                    <option value="70">70 ℃</option>
                    <option value="80" selected>80 ℃</option>
                    <option value="90">90 ℃</option>
                    <option value="100">100 ℃</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label id="labelColdWater" for="cold_water_temp">冷水溫度 (℃):<span id="coldWaterWarning" class="cold-water-warning" data-tooltip="">💡</span></label>
            <div class="select-wrapper">
                <select id="cold_water_temp" name="cold_water_temp">
                    <option value="16">16 ℃</option>
                    <option value="18">18 ℃</option>
                    <option value="20" selected>20 ℃</option>
                    <option value="22">22 ℃</option>
                    <option value="24">24 ℃</option>
                    <option value="26">26 ℃</option>
                </select>
            </div>
        </div>
        
        <div id="result_area">
            <p id="initialPrompt">請選擇上方參數並點擊「計算」</p>
        </div>
        
    </div>

                infoWhyTempContent: 'The ideal 42-48℃ range ensures complete dissolution, preserves nutrients, and is ready for your baby to drink.',
                infoHowToUse: 'How to use?',
                infoHowToUseContent: '<ul><li>Select total volume (recommended: 180ml)</li><li>Select hot water temperature (recommended: 80-90℃)</li><li>Select cold water temperature (recommended: 20℃)</li><li>System automatically calculates and displays optimal ratio</li><li>Follow result: pour hot water first, then cold water, finally add formula powder</li></ul>',
                copyResult: '📋 Copy',
                copySuccess: '✅ Copied',
                shareResult: '🔗 Share Result'
            }
        };

        // 檢測使用者瀏覽器的預設語言
        function detectUserLanguage() {
            const browserLang = navigator.language || navigator.userLanguage;
            // 檢查是否為中文（包括 zh、zh-TW、zh-CN、zh-HK 等）
            if (browserLang.toLowerCase().startsWith('zh')) {
                return 'zh';
            }
            return 'en';
        }

        let currentLang = detectUserLanguage(); 

        function switchLanguage() {
            currentLang = (currentLang === 'zh') ? 'en' : 'zh';
            applyLanguage();
        }

        function toggleInfo() {
            const infoContent = document.getElementById('infoContent');
            const infoToggle = document.getElementById('infoToggle');
            if (infoContent && infoToggle) {
                infoContent.classList.toggle('expanded');
                infoToggle.classList.toggle('expanded');
            }
        }

        function updateInfoContent() {
            const lang = languageData[currentLang];
            const infoContentText = document.getElementById('infoContentText');
            if (infoContentText) {
                infoContentText.innerHTML = `
                    <p><strong>${lang.infoWhy10ml}</strong><br>${lang.infoWhy10mlContent}</p>
                    <p><strong>${lang.infoWhyTemp}</strong><br>${lang.infoWhyTempContent}</p>
                    <p><strong>${lang.infoHowToUse}</strong><br>${lang.infoHowToUseContent}</p>
                `;
            }
            const infoToggleText = document.getElementById('infoToggleText');
            if (infoToggleText) {
                infoToggleText.textContent = lang.infoToggleText;
            }
        }

        function applyLanguage() {
            const lang = languageData[currentLang];
            
            // 安全地更新所有元素，添加 null 檢查
            const appTitleEl = document.getElementById('appTitle');
            if (appTitleEl) appTitleEl.textContent = lang.appTitle;
            
            const mainTitleEl = document.getElementById('mainTitle');
            if (mainTitleEl) mainTitleEl.textContent = lang.mainTitle;
            
            const labelMilkAmountEl = document.getElementById('labelMilkAmount');
            if (labelMilkAmountEl) labelMilkAmountEl.textContent = lang.labelMilkAmount;
            
            const labelHotWaterEl = document.getElementById('labelHotWater');
            if (labelHotWaterEl) labelHotWaterEl.textContent = lang.labelHotWater;
            
            const labelColdWaterEl = document.getElementById('labelColdWater');
            if (labelColdWaterEl) {
                // 使用 innerHTML 同時設置 label 文字和提示，確保提示元素始終存在
                labelColdWaterEl.innerHTML = lang.labelColdWater + '<span id="coldWaterWarning" class="cold-water-warning" data-tooltip="' + lang.coldWaterWarning + '">💡</span>';
            }
            
            // 更新語言切換按鈕文字：目前是中文時顯示"English"，目前是英文時顯示"中文"
            const toggleButton = document.getElementById('language-toggle');
            if (toggleButton) {
                toggleButton.textContent = (currentLang === 'zh') ? 'English' : '中文';
            }
            
            // 更新說明內容
            updateInfoContent();
            
            calculateWaterAmount(true); 
        }

        // 任務 4：保存和載入設定
        function saveSettings() {
            const settings = {
                milkAmount: document.getElementById('milk_amount').value,
                hotWaterTemp: document.getElementById('hot_water_temp').value,
                coldWaterTemp: document.getElementById('cold_water_temp').value
            };
            try {
                localStorage.setItem('milkCalculator_settings', JSON.stringify(settings));
            } catch (e) {
                console.warn('無法保存設定:', e);
            }
        }

        function loadSettings() {
            try {
                const savedSettings = localStorage.getItem('milkCalculator_settings');
                if (savedSettings) {
                    const settings = JSON.parse(savedSettings);
                    if (settings.milkAmount) document.getElementById('milk_amount').value = settings.milkAmount;
                    if (settings.hotWaterTemp) document.getElementById('hot_water_temp').value = settings.hotWaterTemp;
                    if (settings.coldWaterTemp) document.getElementById('cold_water_temp').value = settings.coldWaterTemp;
                    return true;
                }
            } catch (e) {
                console.warn('無法載入設定:', e);
            }
            return false;
        }

        // 任務 5：複製結果功能
        function copyResult() {
            const resultArea = document.getElementById('result_area');
            if (!resultArea) return;
            
            const resultText = resultArea.innerText || resultArea.textContent;
            if (!resultText || resultText.includes('initialPrompt')) return;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(resultText).then(() => {
                    showCopySuccess();
                }).catch(err => {
                    console.warn('複製失敗:', err);
                    fallbackCopy(resultText);
                });
            } else {
                fallbackCopy(resultText);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.opacity = '0';
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showCopySuccess();
            } catch (err) {
                console.warn('複製失敗:', err);
            }
            document.body.removeChild(textArea);
        }

        function showCopySuccess() {
            const lang = languageData[currentLang];
            const toast = document.createElement('div');
            toast.className = 'copy-success-toast';
            toast.textContent = lang.copySuccess;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 2000);
        }

        function calculateWaterAmount(isLanguageSwitch = false) {
            const totalVolume = parseInt(document.getElementById('milk_amount').value);
            const Th = parseInt(document.getElementById('hot_water_temp').value);
            const Tc = parseInt(document.getElementById('cold_water_temp').value);
            const T_min = 42;
            const T_max = 48;
            const T_ideal = 45;
            const resultArea = document.getElementById('result_area');
            const lang = languageData[currentLang];

            // 保存設定
            saveSettings();

            if (isLanguageSwitch && resultArea.innerHTML.includes('initialPrompt')) {
                resultArea.innerHTML = `<p id="initialPrompt">${lang.initialPrompt}</p>`;
                return;
            }

            let bestVh = 0;
            let bestVc = 0;
            let closestTemp = 0;
            let minTempDiff = Infinity; 

            if (T_min < Tc || T_max > Th) {
                let errorMsg = lang.errorCannotMixMsg.replace('{Th}', Th).replace('{Tc}', Tc).replace('{min}', T_min).replace('{max}', T_max);
                let suggestion = lang.errorCannotMixSuggestion || '';
                resultArea.innerHTML = `<p style="color:#FF6B6B; font-weight: bold; font-size: 1.1em;">${lang.errorCannotMixTitle}</p>
                                        <p style="margin: 12px 0; color: #2C3E50;">${errorMsg}</p>
                                        <p style="font-size:0.95em; color:#FFB84D; margin-top: 12px; font-weight: 600;">${suggestion}</p>`;
                return;
            }

            for (let Vh_try = 10; Vh_try < totalVolume; Vh_try += 10) {
                const Vc_try = totalVolume - Vh_try;
                if (Vc_try % 10 !== 0) continue; 
                
                const Tm_actual = (Vh_try * Th + Vc_try * Tc) / totalVolume;

                if (Tm_actual >= T_min && Tm_actual <= T_max) {
                    const tempDiff = Math.abs(Tm_actual - T_ideal);
                    
                    if (tempDiff < minTempDiff) {
                        minTempDiff = tempDiff;
                        bestVh = Vh_try;
                        bestVc = Vc_try;
                        closestTemp = Tm_actual;
                    }
                }
            }

            if (bestVh > 0) {
                let note = lang.resultRangeNote.replace('{min}', T_min).replace('{max}', T_max);
                let hotLabel = lang.resultHot.replace('{temp}', Th);
                let coldLabel = lang.resultCold.replace('{temp}', Tc);

                resultArea.innerHTML = `
                    <p style="font-size: 1.2em; margin-bottom: 15px; font-weight: 700; color: #2C3E50;">${lang.resultBest}</p>
                    <hr style="border: none; border-top: 2px solid rgba(255, 158, 199, 0.3); margin: 15px 0;">
                    <p style="font-size: 1.15em; margin: 14px 0; color: #2C3E50; font-weight: 600;">${hotLabel}<strong style="color: #E91E63; font-size: 1.6em; font-weight: 800; text-shadow: 0 2px 4px rgba(233, 30, 99, 0.25); letter-spacing: 0.5px; margin-left: 8px;">${bestVh} ml</strong></p>
                    <p style="font-size: 1.15em; margin: 14px 0; color: #2C3E50; font-weight: 600;">${coldLabel}<strong style="color: #E91E63; font-size: 1.6em; font-weight: 800; text-shadow: 0 2px 4px rgba(233, 30, 99, 0.25); letter-spacing: 0.5px; margin-left: 8px;">${bestVc} ml</strong></p>
                    <p style="font-size:1.15em; color:#FF6B35; margin-top: 18px; font-weight: 700;">
                        ${lang.resultActualTemp}<strong style="color: #E91E63; font-size: 1.7em; font-weight: 800; text-shadow: 0 2px 4px rgba(233, 30, 99, 0.25); letter-spacing: 0.5px; margin-left: 8px;">${closestTemp.toFixed(1)} ℃</strong>
                    </p>
                    <p style="font-size:0.95em; color:#2C3E50; margin-top: 12px; opacity: 0.85; font-weight: 500;">${note}</p>
                    <div class="result-actions">
                        <button class="result-action-btn" onclick="copyResult()">${lang.copyResult}</button>
                    </div>
                `;
            } else {
                 let errorMsg = lang.errorNo10xMsg.replace('{min}', T_min).replace('{max}', T_max);
                resultArea.innerHTML = `<p style="color:#FF6B6B; font-weight: bold; font-size: 1.1em;">${lang.errorNo10xTitle}</p>
                                        <p style="margin: 12px 0; color: #2C3E50;">${errorMsg}</p>
                                        <p style="font-size:0.95em; color:#FFB84D; margin-top: 12px; font-weight: 600;">${lang.errorNo10xHint}</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 任務 4：載入保存的設定
            const settingsLoaded = loadSettings();
            
            // 確保按鈕文字正確更新
            applyLanguage();
            // 再次確認按鈕文字（防止時序問題）
            setTimeout(() => {
                const toggleButton = document.getElementById('language-toggle');
                if (toggleButton) {
                    if (currentLang === 'zh') {
                        toggleButton.textContent = 'English';
                    } else {
                        toggleButton.textContent = '中文';
                    }
                }
            }, 100);
            
            // 任務 1：實現即時計算功能 - 為所有 select 元素添加 change 事件監聽器
            const milkAmountSelect = document.getElementById('milk_amount');
            const hotWaterTempSelect = document.getElementById('hot_water_temp');
            const coldWaterTempSelect = document.getElementById('cold_water_temp');
            
            milkAmountSelect.addEventListener('change', calculateWaterAmount);
            hotWaterTempSelect.addEventListener('change', calculateWaterAmount);
            coldWaterTempSelect.addEventListener('change', calculateWaterAmount);
            
            // 任務 7：鍵盤快捷鍵支援 - 為 select 元素添加 Enter 鍵監聽
            [milkAmountSelect, hotWaterTempSelect, coldWaterTempSelect].forEach(select => {
                select.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        calculateWaterAmount();
                        // 保持焦點在當前 select 上
                        select.focus();
                    }
                });
            });
            
            // 初始化說明內容
            updateInfoContent();
            
            // 如果載入了設定，觸發一次計算
            if (settingsLoaded) {
                setTimeout(() => calculateWaterAmount(), 100);
            }
        });
    </script>

</body>
</html>
