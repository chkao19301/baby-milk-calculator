<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="智能奶粉沖泡計算機，幫助您計算熱水和冷水的最佳配比，確保水溫在42-48℃的理想範圍內。支援10ml倍數精確測量。">
    <meta name="keywords" content="奶粉計算機,沖泡計算,嬰兒奶粉,水溫控制,育兒工具">
    <meta name="author" content="Baby Milk Calculator">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="🍼 奶粉沖泡計算機">
    <meta property="og:description" content="智能計算熱水和冷水的最佳配比，確保水溫在理想範圍內">
    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:title" content="🍼 奶粉沖泡計算機">
    <meta property="twitter:description" content="智能計算熱水和冷水的最佳配比，確保水溫在理想範圍內">
    <title id="appTitle">🍼 奶粉沖泡計算機 (10倍數)</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CSS 變數系統 - 顏色、間距、動畫統一管理
           ============================================ */
        :root {
            /* 主色調 */
            --color-primary: #FF9EC7;
            --color-primary-dark: #E91E63;
            --color-secondary: #FFB84D;
            --color-accent: #E91E63;
            
            /* 背景色 */
            --color-bg-start: #E8F4F8;
            --color-bg-mid: #F5E6F3;
            --color-bg-end: #FFF0F5;
            --color-text: #2C3E50;
            --color-text-light: rgba(44, 62, 80, 0.85);
            
            /* 強調色 */
            --color-warning: #FFB84D;
            --color-error: #FF6B6B;
            --color-success: #4CAF50;
            
            /* 毛玻璃效果 */
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-bg-light: rgba(255, 255, 255, 0.3);
            --glass-bg-lighter: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-blur: blur(20px);
            
            /* 間距系統 (4px 倍數) */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-2xl: 24px;
            --spacing-3xl: 32px;
            --spacing-4xl: 40px;
            
            /* 字體系統 */
            --font-family-base: 'Noto Sans TC', 'Poppins', 'Helvetica Neue', Arial, sans-serif;
            --font-family-mono: 'Courier New', 'Monaco', monospace;
            --font-size-xs: 0.85rem;
            --font-size-sm: 0.95rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.1rem;
            --font-size-xl: 1.2rem;
            --font-size-2xl: 1.5rem;
            --font-size-3xl: 1.8rem;
            --font-size-4xl: 2.2rem;
            --line-height-base: 1.6;
            --line-height-tight: 1.4;
            
            /* 動畫系統 */
            --transition-fast: 0.2s ease-out;
            --transition-base: 0.3s ease-out;
            --transition-slow: 0.5s ease-out;
            
            /* 圓角 */
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            
            /* 陰影 */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        /* 基礎樣式與手機優化 - 親子向粉藍漸變背景 */
        body {
            font-family: var(--font-family-base);
            margin: 0;
            padding: var(--spacing-xl);
            background: linear-gradient(135deg, var(--color-bg-start) 0%, var(--color-bg-mid) 50%, var(--color-bg-end) 100%);
            background-attachment: fixed;
            color: var(--color-text);
            min-height: 100vh;
            position: relative;
            line-height: var(--line-height-base);
        }

        /* 添加裝飾性雲朵背景（可選） */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .calculator-container {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: var(--spacing-2xl);
            padding-top: var(--spacing-xl);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg), 
                        var(--shadow-sm),
                        inset 0 1px 0 rgba(255, 255, 255, 0.5);
            border: 1px solid var(--glass-border);
            position: relative;
            max-width: 100%;
            margin: 0 auto;
            z-index: 1;
        }

        /* 語言切換按鈕樣式 - 毛玻璃效果 */
        #language-toggle {
            position: absolute;
            top: var(--spacing-xl);
            right: var(--spacing-xl);
            z-index: 10;
            padding: var(--spacing-sm) var(--spacing-md); 
            font-size: var(--font-size-xs);
            background: rgba(255, 184, 77, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--color-text);
            border: 1px solid rgba(255, 184, 77, 0.5);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-base);
            font-weight: 600;
            min-width: 44px;
            min-height: 44px;
        }
        #language-toggle:hover {
            background: rgba(255, 184, 77, 0.5);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 184, 77, 0.3);
        }
        #language-toggle:focus {
            outline: 2px solid var(--color-secondary);
            outline-offset: 2px;
        }

        /* 標題樣式 - 漸變文字效果 */
        h1 {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 50%, var(--color-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-top: var(--spacing-xl);
            margin-bottom: var(--spacing-3xl);
            font-size: var(--font-size-3xl);
            padding-right: 70px;
            padding-left: var(--spacing-md);
            font-weight: 700;
            letter-spacing: 0.5px;
            line-height: var(--line-height-tight);
        }

        /* 說明區塊樣式 - 毛玻璃效果 */
        .info-section {
            margin-bottom: var(--spacing-2xl);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md);
        }

        .info-toggle {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            color: var(--color-text);
            border: none;
            border-radius: var(--radius-sm);
            padding: var(--spacing-md) var(--spacing-lg);
            font-size: var(--font-size-sm);
            cursor: pointer;
            width: 100%;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all var(--transition-base);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
            min-height: 44px;
        }

        .info-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 158, 199, 0.4);
        }

        .info-toggle:focus {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        .info-toggle::after {
            content: '▼';
            font-size: 0.8em;
            transition: transform var(--transition-base);
        }

        .info-toggle.expanded::after {
            transform: rotate(180deg);
        }

        .info-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--transition-base);
            margin-top: 0;
        }

        .info-content.expanded {
            max-height: 1000px;
            margin-top: var(--spacing-md);
        }

        .info-content p {
            margin: var(--spacing-md) 0;
            line-height: var(--line-height-base);
            color: var(--color-text);
            font-size: var(--font-size-sm);
        }

        .info-content strong {
            color: var(--color-primary);
            font-weight: 700;
        }

        .info-content ul {
            margin: var(--spacing-md) 0;
            padding-left: var(--spacing-xl);
            color: var(--color-text);
        }

        .info-content li {
            margin: var(--spacing-sm) 0;
            line-height: var(--line-height-base);
        }

        /* 欄位群組 */
        .form-group {
            margin-bottom: var(--spacing-xl);
        }

        /* 標籤樣式 - 溫暖色調 */
        label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            font-size: var(--font-size-lg);
            color: var(--color-text);
            line-height: var(--line-height-base);
        }

        /* 下拉式選單樣式 - 毛玻璃效果 */
        select {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-md);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-sm);
            box-sizing: border-box;
            font-size: var(--font-size-lg);
            font-family: var(--font-family-base);
            background: var(--glass-bg-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--color-text);
            min-height: 48px; 
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
        }

        select:focus {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
            border-color: rgba(255, 158, 199, 0.6);
            background: var(--glass-bg-lighter);
            box-shadow: 0 4px 12px rgba(255, 158, 199, 0.2);
            transform: translateY(-1px);
        }
        
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 1em;
            position: absolute;
            right: var(--spacing-md);
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--color-primary);
            font-weight: bold;
        }

        /* 計算按鈕樣式 - 漸變背景 + 毛玻璃效果 */
        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn) { 
            width: 100%;
            padding: var(--spacing-md);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            color: var(--color-text);
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-xl);
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-base);
            margin-top: var(--spacing-md);
            box-shadow: 0 4px 16px rgba(255, 158, 199, 0.3);
            position: relative;
            overflow: hidden;
            min-height: 48px;
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn)::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left var(--transition-slow);
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn):hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 158, 199, 0.4);
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn):hover::before {
            left: 100%;
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn):focus {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn):active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(255, 158, 199, 0.3);
        }

        /* 結果顯示區 - 毛玻璃卡片設計 */
        #result_area {
            margin-top: var(--spacing-3xl);
            padding: var(--spacing-xl);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-lg);
            text-align: center;
            background: var(--glass-bg-light);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            min-height: 100px;
            box-shadow: var(--shadow-md);
            animation: fadeIn var(--transition-slow) ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes numberCount {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #result_area p {
            font-size: var(--font-size-lg);
            font-weight: 600;
            margin: var(--spacing-md) 0;
            color: var(--color-text);
            line-height: var(--line-height-base);
        }
        #result_area strong {
            font-size: var(--font-size-2xl);
            color: var(--color-primary-dark);
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(233, 30, 99, 0.2);
            letter-spacing: 0.5px;
            font-family: var(--font-family-mono);
            animation: numberCount var(--transition-base) ease-out;
        }
        
        /* 錯誤訊息卡片樣式 */
        .error-card {
            background: rgba(255, 107, 107, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin: var(--spacing-md) 0;
        }
        
        .error-card-title {
            color: var(--color-error);
            font-weight: 700;
            font-size: var(--font-size-lg);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .error-card-message {
            color: var(--color-text);
            margin: var(--spacing-md) 0;
            line-height: var(--line-height-base);
        }
        
        .error-card-suggestion {
            color: var(--color-warning);
            font-size: var(--font-size-sm);
            margin-top: var(--spacing-md);
            font-weight: 600;
            padding: var(--spacing-md);
            background: rgba(255, 184, 77, 0.1);
            border-radius: var(--radius-sm);
        }

        /* 冷水提示樣式 - 互動標記（懸停顯示） */
        .cold-water-warning {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: var(--spacing-sm);
            padding: var(--spacing-xs) var(--spacing-md);
            background: rgba(255, 184, 77, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--color-warning);
            font-size: var(--font-size-sm);
            font-weight: 600;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 184, 77, 0.4);
            cursor: help;
            position: relative;
            transition: all var(--transition-base);
            box-shadow: 0 2px 6px rgba(255, 184, 77, 0.2);
            line-height: 1.2;
            min-width: 24px;
            min-height: 24px;
        }

        .cold-water-warning:hover {
            background: rgba(255, 184, 77, 0.3);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 184, 77, 0.3);
        }
        
        .cold-water-warning:focus {
            outline: 2px solid var(--color-warning);
            outline-offset: 2px;
        }

        .cold-water-warning::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-md);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--color-text);
            font-size: var(--font-size-sm);
            border-radius: var(--radius-sm);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all var(--transition-base);
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 184, 77, 0.3);
        }

        .cold-water-warning:hover::after {
            opacity: 1;
        }

        /* 結果操作按鈕樣式 */
        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .result-action-btn {
            padding: var(--spacing-md) var(--spacing-lg);
            background: rgba(255, 184, 77, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--color-text);
            border: 1px solid rgba(255, 184, 77, 0.5);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-sm);
            cursor: pointer;
            transition: all var(--transition-base);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
            min-height: 44px;
            min-width: 44px;
        }

        .result-action-btn:hover {
            background: rgba(255, 184, 77, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 184, 77, 0.3);
        }

        .result-action-btn:focus {
            outline: 2px solid var(--color-secondary);
            outline-offset: 2px;
        }

        .result-action-btn:active {
            transform: translateY(0);
        }

        .copy-success-toast {
            position: fixed;
            top: var(--spacing-xl);
            right: var(--spacing-xl);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: var(--color-text);
            padding: var(--spacing-md) var(--spacing-2xl);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            z-index: 10000;
            animation: slideIn var(--transition-base) ease-out;
            border: 1px solid rgba(255, 158, 199, 0.3);
            font-weight: 600;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        

        /* 響應式設計 - 電腦版 (平板和桌面) */
        @media (min-width: 768px) {
            body {
                padding: var(--spacing-4xl);
            }

            .calculator-container {
                max-width: 600px;
                padding: var(--spacing-3xl);
                padding-top: var(--spacing-3xl);
                border-radius: var(--radius-xl);
            }

            h1 {
                font-size: var(--font-size-4xl);
                margin-bottom: var(--spacing-4xl);
            }

            label {
                font-size: var(--font-size-xl);
                margin-bottom: var(--spacing-sm);
            }

            select {
                font-size: 1.15rem;
                padding: var(--spacing-md) var(--spacing-md);
            }

            button:not(#language-toggle) {
                font-size: 1.3rem;
                padding: var(--spacing-lg);
            }

            #result_area {
                padding: var(--spacing-xl);
                min-height: 120px;
            }

            #result_area p {
                font-size: var(--font-size-xl);
            }

            #result_area strong {
                font-size: 1.7rem;
            }

        }
        
        /* 橫向顯示優化 */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: var(--spacing-lg);
            }
            
            .calculator-container {
                padding: var(--spacing-lg);
                padding-top: var(--spacing-xl);
            }
            
            h1 {
                font-size: var(--font-size-2xl);
                margin-bottom: var(--spacing-lg);
            }
            
            .form-group {
                margin-bottom: var(--spacing-md);
            }
        }

        /* 響應式設計 - 手機版 */
        @media (max-width: 767px) {
            body {
                padding: var(--spacing-md);
            }

            .calculator-container {
                padding: var(--spacing-xl);
                padding-top: 60px; /* 為語言切換按鈕留出空間 */
                border-radius: var(--radius-md);
            }

            /* 語言切換按鈕在手機上的調整 */
            #language-toggle {
                top: var(--spacing-md);
                right: var(--spacing-md);
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: var(--font-size-xs);
            }

            h1 {
                font-size: var(--font-size-2xl);
                margin-top: var(--spacing-md);
                margin-bottom: var(--spacing-2xl);
                padding-right: 80px; /* 為語言按鈕留出空間 */
                padding-left: 0;
            }

            .form-group {
                margin-bottom: var(--spacing-lg);
            }

            label {
                font-size: var(--font-size-base);
                margin-bottom: var(--spacing-sm);
            }

            select {
                font-size: var(--font-size-base);
                padding: var(--spacing-md) var(--spacing-md);
                min-height: 48px; /* 確保觸控友善 */
            }

            button:not(#language-toggle) {
                font-size: var(--font-size-lg);
                padding: var(--spacing-lg);
                margin-top: var(--spacing-md);
            }

            #result_area {
                margin-top: var(--spacing-2xl);
                padding: var(--spacing-md);
                min-height: 90px;
            }

            #result_area p {
                font-size: var(--font-size-base);
                margin: var(--spacing-sm) 0;
            }

            #result_area strong {
                font-size: 1.4rem;
            }

        }

        /* 超小螢幕手機 (小於 360px) */
        @media (max-width: 359px) {
            body {
                padding: var(--spacing-md);
            }

            .calculator-container {
                padding: var(--spacing-md);
                padding-top: 55px;
            }

            h1 {
                font-size: 1.3rem;
                padding-right: 70px;
            }

            label {
                font-size: 0.95rem;
            }

            select {
                font-size: 0.95rem;
            }

            button:not(#language-toggle) {
                font-size: var(--font-size-base);
            }
        }
        
        /* Fallback for browsers that don't support backdrop-filter */
        @supports not (backdrop-filter: blur(10px)) {
            .calculator-container,
            .info-section,
            select,
            .result-action-btn {
                background: rgba(255, 255, 255, 0.9);
            }
        }
    </style>
</head>
<body>

    <div class="calculator-container" role="main" aria-label="奶粉沖泡計算機">
        
        <button id="language-toggle" onclick="switchLanguage()" aria-label="切換語言" aria-pressed="false">English</button>

        <h1 id="mainTitle">👶 奶粉沖泡水量計算 (10ml 單位)</h1>

        <!-- 說明與引導區塊 -->
        <div class="info-section" role="region" aria-labelledby="infoToggle">
            <button class="info-toggle" id="infoToggle" onclick="toggleInfo()" aria-expanded="false" aria-controls="infoContent">
                <span id="infoToggleText">📖 使用說明與常見問題</span>
            </button>
            <div class="info-content" id="infoContent" role="region" aria-labelledby="infoToggle">
                <div id="infoContentText">
                    <!-- 內容將由 JavaScript 動態填入 -->
                </div>
            </div>
        </div>

        <form role="form" aria-label="計算參數設定">
            <div class="form-group">
                <label id="labelMilkAmount" for="milk_amount">總奶量 (ml):</label>
                <div class="select-wrapper">
                    <select id="milk_amount" name="milk_amount" aria-label="總奶量" aria-describedby="labelMilkAmount">
                        <option value="120">120 ml</option>
                        <option value="150">150 ml</option>
                        <option value="180" selected>180 ml</option>
                        <option value="210">210 ml</option>
                        <option value="240">240 ml</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label id="labelHotWater" for="hot_water_temp">熱水溫度 (℃):</label>
                <div class="select-wrapper">
                    <select id="hot_water_temp" name="hot_water_temp" aria-label="熱水溫度" aria-describedby="labelHotWater">
                        <option value="70">70 ℃</option>
                        <option value="80" selected>80 ℃</option>
                        <option value="90">90 ℃</option>
                        <option value="100">100 ℃</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label id="labelColdWater" for="cold_water_temp">冷水溫度 (℃):<span id="coldWaterWarning" class="cold-water-warning" data-tooltip="" role="button" tabindex="0" aria-label="冷水安全提示">💡</span></label>
                <div class="select-wrapper">
                    <select id="cold_water_temp" name="cold_water_temp" aria-label="冷水溫度" aria-describedby="labelColdWater">
                        <option value="16">16 ℃</option>
                        <option value="18">18 ℃</option>
                        <option value="20" selected>20 ℃</option>
                        <option value="22">22 ℃</option>
                        <option value="24">24 ℃</option>
                        <option value="26">26 ℃</option>
                    </select>
                </div>
            </div>
        </form>
        
        <div id="result_area" role="region" aria-live="polite" aria-atomic="true" aria-label="計算結果">
            <p id="initialPrompt">請選擇上方參數，系統將自動計算</p>
        </div>
        
    </div>

    <script>
        // --- JavaScript 保持不變 ---
        const languageData = {
            'zh': {
                appTitle: '🍼 奶粉沖泡計算機',
                mainTitle: '👶 奶粉沖泡水量計算',
                labelMilkAmount: '總奶量：',
                labelHotWater: '熱水溫度（℃）：',
                labelColdWater: '冷水溫度（℃）：',
                coldWaterWarning: '💡 提醒：請使用煮沸過後放涼的開水，或乾淨的飲用水',

                errorCannotMixTitle: '⚠️ 無法調配出合適溫度',
                errorCannotMixMsg: '目前選擇的溫度組合無法達到 {min}~{max}℃ 的理想範圍。',
                errorCannotMixSuggestion: '💡 建議：將熱水調整為 80℃ 或 90℃，或將冷水調整為 20℃ 以下。',
                errorNo10xTitle: '⚠️ 無法找到合適配比',
                errorNo10xMsg: '在 10ml 倍數的限制下，無法找到符合 {min}~{max}℃ 範圍的配比。',
                errorNo10xHint: '💡 建議：試試將熱水調整為 80℃ 或 90℃，或將冷水調整為 18-20℃。',
                infoToggleText: '📖 使用說明',
                infoWhy10ml: '為什麼使用 10ml 倍數？',
                infoWhy10mlContent: '採用 10ml 倍數，方便使用量杯或奶瓶刻度測量，確保沖泡準確。',
                infoWhyTemp: '為什麼目標溫度是 42-48℃？',
                infoWhyTempContent: '42-48℃ 的理想溫度能確保奶粉完全溶解、保留營養，且寶寶可直接飲用。',
                infoHowToUse: '如何使用？',
                infoHowToUseContent: '<ul><li>選擇總奶量（建議：180ml）</li><li>選擇熱水溫度（推薦：80-90℃）</li><li>選擇冷水溫度（推薦：20℃）</li><li>系統自動計算並顯示最佳配比</li><li><strong>正確操作步驟：</strong>先加入熱水 → 倒入奶粉並輕輕搖晃確保完全融解 → 待奶粉完全融解後，再加入冷水調節至理想溫度</li></ul>',
                copyResult: '📋 複製',
                copySuccess: '✅ 已複製',
                shareResult: '🔗 分享結果',
                shareSuccess: '✅ 分享成功',
                shareError: '❌ 分享失敗，請手動複製結果'
            },
            'en': {
                appTitle: '🍼 Formula Water Calculator',
                mainTitle: '👶 Formula Water Calculator',
                labelMilkAmount: 'Total Volume:',
                labelHotWater: 'Hot Water Temp. (℃):',
                labelColdWater: 'Cold Water Temp. (℃):',
                coldWaterWarning: '💡 Reminder: Please use boiled and cooled water, or clean drinking water',
                safetyNotice: 'Reminder: Please use boiled and cooled water, or clean drinking water',
                initialPrompt: 'Select parameters to see optimal ratio',
                resultBest: 'Optimal Ratio:',
                resultHot: 'Hot Water ({temp}℃):',
                resultCold: 'Cold Water ({temp}℃):',
                resultActualTemp: 'Final Temperature:',
                resultRangeNote: '✓ Within ideal range {min}~{max}℃',
                resultSteps: '<div style="margin-top: 8px;"><strong>Steps:</strong></div><div style="margin-top: 8px; line-height: 1.8;">① Add hot water <strong>{hot}ml</strong> first<br>② Add formula powder and shake gently until fully dissolved<br>③ After formula is completely dissolved, add cold water <strong>{cold}ml</strong></div>',
                errorCannotMixTitle: '⚠️ Cannot Create Suitable Temperature',
                errorCannotMixMsg: 'The selected temperature combination cannot reach the ideal range of {min}~{max}℃.',
                errorCannotMixSuggestion: '💡 Suggestion: Adjust hot water to 80℃ or 90℃, or adjust cold water to below 20℃.',
                errorNo10xTitle: '⚠️ Cannot Find Suitable Ratio',
                errorNo10xMsg: 'Under the 10ml multiple limitation, no combination can be found within the {min}~{max}℃ range.',
                errorNo10xHint: '💡 Suggestion: Try adjusting hot water to 80℃ or 90℃, or adjust cold water to 18-20℃.',
                infoToggleText: '📖 Usage Guide',
                infoWhy10ml: 'Why use 10ml multiples?',
                infoWhy10mlContent: 'Using 10ml multiples makes it easy to measure with cups or bottle scales, ensuring accurate preparation.',
                infoWhyTemp: 'Why is the target temperature 42-48℃?',
                infoWhyTempContent: 'The ideal 42-48℃ range ensures complete dissolution, preserves nutrients, and is ready for your baby to drink.',
                infoHowToUse: 'How to use?',
                infoHowToUseContent: '<ul><li>Select total volume (recommended: 180ml)</li><li>Select hot water temperature (recommended: 80-90℃)</li><li>Select cold water temperature (recommended: 20℃)</li><li>System automatically calculates and displays optimal ratio</li><li><strong>Correct steps:</strong> Add hot water first → Add formula powder and shake gently until fully dissolved → After formula is completely dissolved, add cold water to adjust to ideal temperature</li></ul>',
                copyResult: '📋 Copy',
                copySuccess: '✅ Copied',
                shareResult: '🔗 Share Result',
                shareSuccess: '✅ Shared successfully',
                shareError: '❌ Share failed, please copy manually'
            }
        };

        // 檢測使用者瀏覽器的預設語言
        function detectUserLanguage() {
            const browserLang = navigator.language || navigator.userLanguage;
            // 檢查是否為中文（包括 zh、zh-TW、zh-CN、zh-HK 等）
            if (browserLang.toLowerCase().startsWith('zh')) {
                return 'zh';
            }
            return 'en';
        }

        let currentLang = detectUserLanguage(); 

        function switchLanguage() {
            currentLang = (currentLang === 'zh') ? 'en' : 'zh';
            applyLanguage();
        }

        function toggleInfo() {
            const infoContent = document.getElementById('infoContent');
            const infoToggle = document.getElementById('infoToggle');
            if (infoContent && infoToggle) {
                infoContent.classList.toggle('expanded');
                infoToggle.classList.toggle('expanded');
            }
        }

        function updateInfoContent() {
            const lang = languageData[currentLang];
            const infoContentText = document.getElementById('infoContentText');
            if (infoContentText) {
                infoContentText.innerHTML = `
                    <p><strong>${lang.infoWhy10ml}</strong><br>${lang.infoWhy10mlContent}</p>
                    <p><strong>${lang.infoWhyTemp}</strong><br>${lang.infoWhyTempContent}</p>
                    <p><strong>${lang.infoHowToUse}</strong><br>${lang.infoHowToUseContent}</p>
                `;
            }
            const infoToggleText = document.getElementById('infoToggleText');
            if (infoToggleText) {
                infoToggleText.textContent = lang.infoToggleText;
            }
        }

        function applyLanguage() {
            const lang = languageData[currentLang];
            
            // 安全地更新所有元素，添加 null 檢查
            const appTitleEl = document.getElementById('appTitle');
            if (appTitleEl) appTitleEl.textContent = lang.appTitle;
            
            const mainTitleEl = document.getElementById('mainTitle');
            if (mainTitleEl) mainTitleEl.textContent = lang.mainTitle;
            
            const labelMilkAmountEl = document.getElementById('labelMilkAmount');
            if (labelMilkAmountEl) labelMilkAmountEl.textContent = lang.labelMilkAmount;
            
            const labelHotWaterEl = document.getElementById('labelHotWater');
            if (labelHotWaterEl) labelHotWaterEl.textContent = lang.labelHotWater;
            
            const labelColdWaterEl = document.getElementById('labelColdWater');
            if (labelColdWaterEl) {
                // 使用 innerHTML 同時設置 label 文字和提示圖標
                labelColdWaterEl.innerHTML = lang.labelColdWater + '<span id="coldWaterWarning" class="cold-water-warning" data-tooltip="' + lang.coldWaterWarning + '" role="button" tabindex="0" aria-label="冷水安全提示">💡</span>';
            }
            
            // 更新語言切換按鈕文字和 ARIA 狀態
            const toggleButton = document.getElementById('language-toggle');
            if (toggleButton) {
                toggleButton.textContent = (currentLang === 'zh') ? 'English' : '中文';
                toggleButton.setAttribute('aria-pressed', currentLang === 'zh' ? 'true' : 'false');
            }
            
            // 更新說明內容
            updateInfoContent();
            
            calculateWaterAmount(true); 
        }

        // URL 參數管理
        function updateURLParams() {
            const milkAmount = document.getElementById('milk_amount').value;
            const hotWaterTemp = document.getElementById('hot_water_temp').value;
            const coldWaterTemp = document.getElementById('cold_water_temp').value;
            
            const params = new URLSearchParams();
            params.set('milk', milkAmount);
            params.set('hot', hotWaterTemp);
            params.set('cold', coldWaterTemp);
            
            const newURL = window.location.origin + window.location.pathname + '?' + params.toString();
            window.history.replaceState({}, '', newURL);
        }
        
        function loadURLParams() {
            const params = new URLSearchParams(window.location.search);
            const milkAmount = params.get('milk');
            const hotWaterTemp = params.get('hot');
            const coldWaterTemp = params.get('cold');
            
            let hasParams = false;
            
            if (milkAmount) {
                const milkSelect = document.getElementById('milk_amount');
                if (milkSelect && Array.from(milkSelect.options).some(opt => opt.value === milkAmount)) {
                    milkSelect.value = milkAmount;
                    hasParams = true;
                }
            }
            
            if (hotWaterTemp) {
                const hotSelect = document.getElementById('hot_water_temp');
                if (hotSelect && Array.from(hotSelect.options).some(opt => opt.value === hotWaterTemp)) {
                    hotSelect.value = hotWaterTemp;
                    hasParams = true;
                }
            }
            
            if (coldWaterTemp) {
                const coldSelect = document.getElementById('cold_water_temp');
                if (coldSelect && Array.from(coldSelect.options).some(opt => opt.value === coldWaterTemp)) {
                    coldSelect.value = coldWaterTemp;
                    hasParams = true;
                }
            }
            
            return hasParams;
        }
        
        // 任務 4：保存和載入設定
        function saveSettings() {
            const settings = {
                milkAmount: document.getElementById('milk_amount').value,
                hotWaterTemp: document.getElementById('hot_water_temp').value,
                coldWaterTemp: document.getElementById('cold_water_temp').value
            };
            try {
                localStorage.setItem('milkCalculator_settings', JSON.stringify(settings));
            } catch (e) {
                console.warn('無法保存設定:', e);
            }
        }

        function loadSettings() {
            try {
                const savedSettings = localStorage.getItem('milkCalculator_settings');
                if (savedSettings) {
                    const settings = JSON.parse(savedSettings);
                    if (settings.milkAmount) document.getElementById('milk_amount').value = settings.milkAmount;
                    if (settings.hotWaterTemp) document.getElementById('hot_water_temp').value = settings.hotWaterTemp;
                    if (settings.coldWaterTemp) document.getElementById('cold_water_temp').value = settings.coldWaterTemp;
                    return true;
                }
            } catch (e) {
                console.warn('無法載入設定:', e);
            }
            return false;
        }

        // 任務 5：複製結果功能
        function copyResult() {
            const resultArea = document.getElementById('result_area');
            if (!resultArea) return;
            
            const resultText = resultArea.innerText || resultArea.textContent;
            if (!resultText || resultText.includes('initialPrompt')) return;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(resultText).then(() => {
                    showCopySuccess();
                }).catch(err => {
                    console.warn('複製失敗:', err);
                    fallbackCopy(resultText);
                });
            } else {
                fallbackCopy(resultText);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.opacity = '0';
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showCopySuccess();
            } catch (err) {
                console.warn('複製失敗:', err);
            }
            document.body.removeChild(textArea);
        }

        function showCopySuccess() {
            const lang = languageData[currentLang];
            const toast = document.createElement('div');
            toast.className = 'copy-success-toast';
            toast.textContent = lang.copySuccess;
            toast.setAttribute('role', 'alert');
            toast.setAttribute('aria-live', 'polite');
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 2000);
        }
        
        // 分享功能實現
        async function shareResult() {
            const resultArea = document.getElementById('result_area');
            if (!resultArea) return;
            
            const resultText = resultArea.innerText || resultArea.textContent;
            if (!resultText || resultText.includes('initialPrompt')) return;
            
            const lang = languageData[currentLang];
            
            // 確保 URL 包含當前參數
            updateURLParams();
            const shareURL = window.location.href;
            
            const shareData = {
                title: lang.appTitle,
                text: `${lang.appTitle}\n\n${resultText}`,
                url: shareURL
            };
            
            try {
                if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
                    await navigator.share(shareData);
                    showToast(lang.shareSuccess);
                } else {
                    // Fallback: 複製到剪貼板（包含 URL）
                    const textToCopy = `${resultText}\n\n${shareURL}`;
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        await navigator.clipboard.writeText(textToCopy);
                        showCopySuccess();
                    } else {
                        fallbackCopy(textToCopy);
                    }
                }
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.warn('分享失敗:', err);
                    showToast(lang.shareError);
                }
            }
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'copy-success-toast';
            toast.textContent = message;
            toast.setAttribute('role', 'alert');
            toast.setAttribute('aria-live', 'polite');
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 2000);
        }
        
        // 防抖函數
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function calculateWaterAmount(isLanguageSwitch = false) {
            const totalVolume = parseInt(document.getElementById('milk_amount').value);
            const Th = parseInt(document.getElementById('hot_water_temp').value);
            const Tc = parseInt(document.getElementById('cold_water_temp').value);
            const T_min = 42;
            const T_max = 48;
            const T_ideal = 45;
            const resultArea = document.getElementById('result_area');
            const lang = languageData[currentLang];

            // 保存設定
            saveSettings();
            
            // 更新 URL 參數
            updateURLParams();

            if (isLanguageSwitch && resultArea.innerHTML.includes('initialPrompt')) {
                resultArea.innerHTML = `<p id="initialPrompt">${lang.initialPrompt}</p>`;
                return;
            }

            let bestVh = 0;
            let bestVc = 0;
            let closestTemp = 0;
            let minTempDiff = Infinity; 

            if (T_min < Tc || T_max > Th) {
                let errorMsg = lang.errorCannotMixMsg.replace('{Th}', Th).replace('{Tc}', Tc).replace('{min}', T_min).replace('{max}', T_max);
                let suggestion = lang.errorCannotMixSuggestion || '';
                resultArea.innerHTML = `
                    <div class="error-card" role="alert">
                        <div class="error-card-title">${lang.errorCannotMixTitle}</div>
                        <div class="error-card-message">${errorMsg}</div>
                        <div class="error-card-suggestion">${suggestion}</div>
                    </div>
                `;
                return;
            }

            for (let Vh_try = 10; Vh_try < totalVolume; Vh_try += 10) {
                const Vc_try = totalVolume - Vh_try;
                if (Vc_try % 10 !== 0) continue; 
                
                const Tm_actual = (Vh_try * Th + Vc_try * Tc) / totalVolume;

                if (Tm_actual >= T_min && Tm_actual <= T_max) {
                    const tempDiff = Math.abs(Tm_actual - T_ideal);
                    
                    if (tempDiff < minTempDiff) {
                        minTempDiff = tempDiff;
                        bestVh = Vh_try;
                        bestVc = Vc_try;
                        closestTemp = Tm_actual;
                    }
                }
            }

            if (bestVh > 0) {
                let note = lang.resultRangeNote.replace('{min}', T_min).replace('{max}', T_max);
                let hotLabel = lang.resultHot.replace('{temp}', Th);
                let coldLabel = lang.resultCold.replace('{temp}', Tc);
                let steps = lang.resultSteps.replace('{hot}', bestVh).replace('{cold}', bestVc);

                resultArea.innerHTML = `
                    <p style="font-size: 1.2em; margin-bottom: 15px; font-weight: 700; color: var(--color-text);">${lang.resultBest}</p>
                    <hr style="border: none; border-top: 2px solid rgba(255, 158, 199, 0.3); margin: 15px 0;">
                    <p style="font-size: 1.15em; margin: 14px 0; color: var(--color-text); font-weight: 600;">${hotLabel}<strong style="color: var(--color-primary-dark); font-size: 1.6em; font-weight: 800; text-shadow: 0 2px 4px rgba(233, 30, 99, 0.25); letter-spacing: 0.5px; margin-left: 8px; font-family: var(--font-family-mono);">${bestVh} ml</strong></p>
                    <p style="font-size: 1.15em; margin: 14px 0; color: var(--color-text); font-weight: 600;">${coldLabel}<strong style="color: var(--color-primary-dark); font-size: 1.6em; font-weight: 800; text-shadow: 0 2px 4px rgba(233, 30, 99, 0.25); letter-spacing: 0.5px; margin-left: 8px; font-family: var(--font-family-mono);">${bestVc} ml</strong></p>
                    <p style="font-size:1.15em; color:#FF6B35; margin-top: 18px; font-weight: 700;">
                        ${lang.resultActualTemp}<strong style="color: var(--color-primary-dark); font-size: 1.7em; font-weight: 800; text-shadow: 0 2px 4px rgba(233, 30, 99, 0.25); letter-spacing: 0.5px; margin-left: 8px; font-family: var(--font-family-mono);">${closestTemp.toFixed(1)} ℃</strong>
                    </p>
                    <p style="font-size:0.95em; color:var(--color-text-light); margin-top: 12px; font-weight: 500;">${note}</p>
                    <div style="font-size:0.9em; color:var(--color-text); margin-top: 16px; padding: 16px; background: rgba(255, 184, 77, 0.1); border-radius: 12px; line-height: 1.6;">${steps}</div>
                    <div class="result-actions">
                        <button class="result-action-btn" onclick="copyResult()" aria-label="${lang.copyResult}">${lang.copyResult}</button>
                        <button class="result-action-btn" onclick="shareResult()" aria-label="${lang.shareResult}">${lang.shareResult}</button>
                    </div>
                `;
            } else {
                 let errorMsg = lang.errorNo10xMsg.replace('{min}', T_min).replace('{max}', T_max);
                resultArea.innerHTML = `
                    <div class="error-card" role="alert">
                        <div class="error-card-title">${lang.errorNo10xTitle}</div>
                        <div class="error-card-message">${errorMsg}</div>
                        <div class="error-card-suggestion">${lang.errorNo10xHint}</div>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 優先載入 URL 參數，如果沒有參數再載入 localStorage
            const urlParamsLoaded = loadURLParams();
            let settingsLoaded = false;
            
            // 如果沒有 URL 參數，才載入 localStorage 的設定
            if (!urlParamsLoaded) {
                settingsLoaded = loadSettings();
            }
            
            // 如果有 URL 參數，使用說明預設收起；如果沒有參數，預設展開
            const infoToggle = document.getElementById('infoToggle');
            const infoContent = document.getElementById('infoContent');
            if (infoToggle && infoContent) {
                if (!urlParamsLoaded) {
                    // 沒有參數時，預設展開
                    infoToggle.classList.add('expanded');
                    infoContent.classList.add('expanded');
                    infoToggle.setAttribute('aria-expanded', 'true');
                } else {
                    // 有參數時，預設收起
                    infoToggle.classList.remove('expanded');
                    infoContent.classList.remove('expanded');
                    infoToggle.setAttribute('aria-expanded', 'false');
                }
            }
            
            // 確保按鈕文字正確更新
            applyLanguage();
            // 再次確認按鈕文字（防止時序問題）
            setTimeout(() => {
                const toggleButton = document.getElementById('language-toggle');
                if (toggleButton) {
                    if (currentLang === 'zh') {
                        toggleButton.textContent = 'English';
                    } else {
                        toggleButton.textContent = '中文';
                    }
                }
            }, 100);
            
            // 任務 1：實現即時計算功能 - 為所有 select 元素添加 change 事件監聽器（帶防抖）
            const milkAmountSelect = document.getElementById('milk_amount');
            const hotWaterTempSelect = document.getElementById('hot_water_temp');
            const coldWaterTempSelect = document.getElementById('cold_water_temp');
            
            // 使用防抖機制，避免頻繁計算
            const debouncedCalculate = debounce(calculateWaterAmount, 300);
            
            milkAmountSelect.addEventListener('change', debouncedCalculate);
            hotWaterTempSelect.addEventListener('change', debouncedCalculate);
            coldWaterTempSelect.addEventListener('change', debouncedCalculate);
            
            // 任務 7：鍵盤快捷鍵支援 - 為 select 元素添加 Enter 鍵和方向鍵監聽
            [milkAmountSelect, hotWaterTempSelect, coldWaterTempSelect].forEach(select => {
                select.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        calculateWaterAmount();
                        select.focus();
                    } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                        // 方向鍵選擇後自動計算
                        setTimeout(() => debouncedCalculate(), 100);
                    }
                });
            });
            
            // 為安全性提示圖標添加鍵盤支援
            const coldWaterWarning = document.getElementById('coldWaterWarning');
            if (coldWaterWarning) {
                coldWaterWarning.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        coldWaterWarning.click();
                    }
                });
            }
            
            
            // 初始化說明內容
            updateInfoContent();
            
            // 如果載入了設定或 URL 參數，觸發一次計算
            if (settingsLoaded || urlParamsLoaded) {
                setTimeout(() => calculateWaterAmount(), 100);
            }
        });
    </script>

</body>
</html>
