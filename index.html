<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="智能奶粉沖泡計算機，幫助您計算熱水和冷水的最佳配比，確保水溫在42-48℃的理想範圍內。支援10ml倍數精確測量。">
    <meta name="keywords" content="奶粉計算機,沖泡計算,嬰兒奶粉,水溫控制,育兒工具">
    <meta name="author" content="Baby Milk Calculator">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="🍼 奶粉沖泡計算機">
    <meta property="og:description" content="智能計算熱水和冷水的最佳配比，確保水溫在理想範圍內">
    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:title" content="🍼 奶粉沖泡計算機">
    <meta property="twitter:description" content="智能計算熱水和冷水的最佳配比，確保水溫在理想範圍內">
    <title id="appTitle">🍼 奶粉沖泡計算機 (10倍數)</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CSS 變數系統 - 顏色、間距、動畫統一管理
           ============================================ */
        :root {
            /* 主色調 */
            --color-primary: #FF9EC7;
            --color-primary-dark: #E91E63;
            --color-secondary: #FFB84D;
            --color-accent: #E91E63;
            
            /* 背景色 */
            --color-bg-start: #E8F4F8;
            --color-bg-mid: #F5E6F3;
            --color-bg-end: #FFF0F5;
            --color-text: #2C3E50;
            --color-text-light: rgba(44, 62, 80, 0.85);
            
            /* 強調色 */
            --color-warning: #FFB84D;
            --color-error: #FF6B6B;
            --color-success: #4CAF50;
            
            /* 毛玻璃效果 */
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-bg-light: rgba(255, 255, 255, 0.3);
            --glass-bg-lighter: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-blur: blur(20px);
            
            /* 間距系統 (4px 倍數) */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-2xl: 24px;
            --spacing-3xl: 32px;
            --spacing-4xl: 40px;
            
            /* 字體系統 */
            --font-family-base: 'Noto Sans TC', 'Poppins', 'Helvetica Neue', Arial, sans-serif;
            --font-family-mono: 'Courier New', 'Monaco', monospace;
            --font-size-xs: 0.85rem;
            --font-size-sm: 0.95rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.1rem;
            --font-size-xl: 1.2rem;
            --font-size-2xl: 1.5rem;
            --font-size-3xl: 1.8rem;
            --font-size-4xl: 2.2rem;
            --line-height-base: 1.6;
            --line-height-tight: 1.4;
            
            /* 動畫系統 */
            --transition-fast: 0.2s ease-out;
            --transition-base: 0.3s ease-out;
            --transition-slow: 0.5s ease-out;
            
            /* 圓角 */
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            
            /* 陰影 */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        /* 基礎樣式與手機優化 - 親子向粉藍漸變背景 */
        body {
            font-family: var(--font-family-base);
            margin: 0;
            padding: var(--spacing-xl);
            background: linear-gradient(135deg, var(--color-bg-start) 0%, var(--color-bg-mid) 50%, var(--color-bg-end) 100%);
            background-attachment: fixed;
            color: var(--color-text);
            min-height: 100vh;
            position: relative;
            line-height: var(--line-height-base);
        }

        /* 添加裝飾性雲朵背景（可選） */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .calculator-container {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: var(--spacing-2xl);
            padding-top: var(--spacing-xl);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg), 
                        var(--shadow-sm),
                        inset 0 1px 0 rgba(255, 255, 255, 0.5);
            border: 1px solid var(--glass-border);
            position: relative;
            max-width: 100%;
            margin: 0 auto;
            z-index: 1;
        }

        /* 語言切換按鈕樣式 - 毛玻璃效果 */
        #language-toggle {
            position: absolute;
            top: var(--spacing-xl);
            right: var(--spacing-xl);
            z-index: 10;
            padding: var(--spacing-sm) var(--spacing-md); 
            font-size: var(--font-size-xs);
            background: rgba(255, 184, 77, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--color-text);
            border: 1px solid rgba(255, 184, 77, 0.5);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-base);
            font-weight: 600;
            min-width: 44px;
            min-height: 44px;
        }
        #language-toggle:hover {
            background: rgba(255, 184, 77, 0.5);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 184, 77, 0.3);
        }
        #language-toggle:focus {
            outline: 2px solid var(--color-secondary);
            outline-offset: 2px;
        }

        /* 標題樣式 - 漸變文字效果 */
        h1 {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 50%, var(--color-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-top: var(--spacing-xl);
            margin-bottom: var(--spacing-3xl);
            font-size: var(--font-size-3xl);
            padding-right: 70px;
            padding-left: var(--spacing-md);
            font-weight: 700;
            letter-spacing: 0.5px;
            line-height: var(--line-height-tight);
        }

        /* 說明區塊樣式 - 毛玻璃效果 */
        .info-section {
            margin-bottom: var(--spacing-2xl);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md);
        }

        .info-toggle {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            color: var(--color-text);
            border: none;
            border-radius: var(--radius-sm);
            padding: var(--spacing-md) var(--spacing-lg);
            font-size: var(--font-size-sm);
            cursor: pointer;
            width: 100%;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all var(--transition-base);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
            min-height: 44px;
        }

        .info-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 158, 199, 0.4);
        }

        .info-toggle:focus {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        .info-toggle::after {
            content: '▼';
            font-size: 0.8em;
            transition: transform var(--transition-base);
        }

        .info-toggle.expanded::after {
            transform: rotate(180deg);
        }

        .info-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--transition-base);
            margin-top: 0;
        }

        .info-content.expanded {
            max-height: 1000px;
            margin-top: var(--spacing-md);
        }

        .info-content p {
            margin: var(--spacing-md) 0;
            line-height: var(--line-height-base);
            color: var(--color-text);
            font-size: var(--font-size-sm);
        }

        .info-content strong {
            color: var(--color-primary);
            font-weight: 700;
        }

        .info-content ul {
            margin: var(--spacing-md) 0;
            padding-left: var(--spacing-xl);
            color: var(--color-text);
        }

        .info-content li {
            margin: var(--spacing-sm) 0;
            line-height: var(--line-height-base);
        }

        /* 欄位群組 */
        .form-group {
            margin-bottom: var(--spacing-xl);
        }

        /* 標籤樣式 - 溫暖色調 */
        label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            font-size: var(--font-size-lg);
            color: var(--color-text);
            line-height: var(--line-height-base);
        }

        /* 下拉式選單樣式 - 毛玻璃效果 */
        select {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-md);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-sm);
            box-sizing: border-box;
            font-size: var(--font-size-lg);
            font-family: var(--font-family-base);
            background: var(--glass-bg-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--color-text);
            min-height: 48px; 
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
        }

        select:focus {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
            border-color: rgba(255, 158, 199, 0.6);
            background: var(--glass-bg-lighter);
            box-shadow: 0 4px 12px rgba(255, 158, 199, 0.2);
            transform: translateY(-1px);
        }
        
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 1em;
            position: absolute;
            right: var(--spacing-md);
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--color-primary);
            font-weight: bold;
        }

        /* 計算按鈕樣式 - 漸變背景 + 毛玻璃效果 */
        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn) { 
            width: 100%;
            padding: var(--spacing-md);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            color: var(--color-text);
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-xl);
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-base);
            margin-top: var(--spacing-md);
            box-shadow: 0 4px 16px rgba(255, 158, 199, 0.3);
            position: relative;
            overflow: hidden;
            min-height: 48px;
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn)::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left var(--transition-slow);
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn):hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 158, 199, 0.4);
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn):hover::before {
            left: 100%;
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn):focus {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        button:not(#language-toggle):not(.info-toggle):not(.result-action-btn):active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(255, 158, 199, 0.3);
        }

        /* 結果顯示區 - 毛玻璃卡片設計 */
        #result_area {
            margin-top: var(--spacing-3xl);
            padding: var(--spacing-xl);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-lg);
            text-align: center;
            background: var(--glass-bg-light);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            min-height: 100px;
            box-shadow: var(--shadow-md);
            animation: fadeIn var(--transition-slow) ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes numberCount {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #result_area p {
            font-size: var(--font-size-lg);
            font-weight: 600;
            margin: var(--spacing-md) 0;
            color: var(--color-text);
            line-height: var(--line-height-base);
        }
        #result_area strong {
            font-size: var(--font-size-2xl);
            color: var(--color-primary-dark);
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(233, 30, 99, 0.2);
            letter-spacing: 0.5px;
            font-family: var(--font-family-mono);
            animation: numberCount var(--transition-base) ease-out;
        }
        
        /* 錯誤訊息卡片樣式 */
        .error-card {
            background: rgba(255, 107, 107, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin: var(--spacing-md) 0;
        }
        
        .error-card-title {
            color: var(--color-error);
            font-weight: 700;
            font-size: var(--font-size-lg);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .error-card-message {
            color: var(--color-text);
            margin: var(--spacing-md) 0;
            line-height: var(--line-height-base);
        }
        
        .error-card-suggestion {
            color: var(--color-warning);
            font-size: var(--font-size-sm);
            margin-top: var(--spacing-md);
            font-weight: 600;
            padding: var(--spacing-md);
            background: rgba(255, 184, 77, 0.1);
            border-radius: var(--radius-sm);
        }

        /* 冷水提示樣式 - 互動標記（懸停顯示） */
        .cold-water-warning {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: var(--spacing-sm);
            padding: var(--spacing-xs) var(--spacing-md);
            background: rgba(255, 184, 77, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--color-warning);
            font-size: var(--font-size-sm);
            font-weight: 600;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 184, 77, 0.4);
            cursor: help;
            position: relative;
            transition: all var(--transition-base);
            box-shadow: 0 2px 6px rgba(255, 184, 77, 0.2);
            line-height: 1.2;
            min-width: 24px;
            min-height: 24px;
        }

        .cold-water-warning:hover {
            background: rgba(255, 184, 77, 0.3);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 184, 77, 0.3);
        }
        
        .cold-water-warning:focus {
            outline: 2px solid var(--color-warning);
            outline-offset: 2px;
        }

        .cold-water-warning::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-md);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--color-text);
            font-size: var(--font-size-sm);
            border-radius: var(--radius-sm);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all var(--transition-base);
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 184, 77, 0.3);
        }

        .cold-water-warning:hover::after {
            opacity: 1;
        }

        /* 結果操作按鈕樣式 */
        .result-actions {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
            justify-content: center;
            flex-wrap: wrap;
        }

        .result-action-btn {
            padding: var(--spacing-md) var(--spacing-lg);
            background: rgba(255, 184, 77, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--color-text);
            border: 1px solid rgba(255, 184, 77, 0.5);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-sm);
            cursor: pointer;
            transition: all var(--transition-base);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
            min-height: 44px;
            min-width: 44px;
        }

        .result-action-btn:hover {
            background: rgba(255, 184, 77, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 184, 77, 0.3);
        }

        .result-action-btn:focus {
            outline: 2px solid var(--color-secondary);
            outline-offset: 2px;
        }

        .result-action-btn:active {
            transform: translateY(0);
        }

        .copy-success-toast {
            position: fixed;
            top: var(--spacing-xl);
            right: var(--spacing-xl);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: var(--color-text);
            padding: var(--spacing-md) var(--spacing-2xl);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            z-index: 10000;
            animation: slideIn var(--transition-base) ease-out;
            border: 1px solid rgba(255, 158, 199, 0.3);
            font-weight: 600;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        

        /* 響應式設計 - 電腦版 (平板和桌面) */
        @media (min-width: 768px) {
            body {
                padding: var(--spacing-4xl);
            }

            .calculator-container {
                max-width: 600px;
                padding: var(--spacing-3xl);
                padding-top: var(--spacing-3xl);
                border-radius: var(--radius-xl);
            }

            h1 {
                font-size: var(--font-size-4xl);
                margin-bottom: var(--spacing-4xl);
            }

            label {
                font-size: var(--font-size-xl);
                margin-bottom: var(--spacing-sm);
            }

            select {
                font-size: 1.15rem;
                padding: var(--spacing-md) var(--spacing-md);
            }

            button:not(#language-toggle) {
                font-size: 1.3rem;
                padding: var(--spacing-lg);
            }

            #result_area {
                padding: var(--spacing-xl);
                min-height: 120px;
            }

            #result_area p {
                font-size: var(--font-size-xl);
            }

            #result_area strong {
                font-size: 1.7rem;
            }

        }
        
        /* 橫向顯示優化 */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: var(--spacing-lg);
            }
            
            .calculator-container {
                padding: var(--spacing-lg);
                padding-top: var(--spacing-xl);
            }
            
            h1 {
                font-size: var(--font-size-2xl);
                margin-bottom: var(--spacing-lg);
            }
            
            .form-group {
                margin-bottom: var(--spacing-md);
            }
        }

        /* 響應式設計 - 手機版 */
        @media (max-width: 767px) {
            body {
                padding: var(--spacing-md);
            }

            .calculator-container {
                padding: var(--spacing-xl);
                padding-top: 60px; /* 為語言切換按鈕留出空間 */
                border-radius: var(--radius-md);
            }

            /* 語言切換按鈕在手機上的調整 */
            #language-toggle {
                top: var(--spacing-md);
                right: var(--spacing-md);
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: var(--font-size-xs);
            }

            h1 {
                font-size: var(--font-size-2xl);
                margin-top: var(--spacing-md);
                margin-bottom: var(--spacing-2xl);
                padding-right: 80px; /* 為語言按鈕留出空間 */
                padding-left: 0;
            }

            .form-group {
                margin-bottom: var(--spacing-lg);
            }

            label {
                font-size: var(--font-size-base);
                margin-bottom: var(--spacing-sm);
            }

            select {
                font-size: var(--font-size-base);
                padding: var(--spacing-md) var(--spacing-md);
                min-height: 48px; /* 確保觸控友善 */
            }

            button:not(#language-toggle) {
                font-size: var(--font-size-lg);
                padding: var(--spacing-lg);
                margin-top: var(--spacing-md);
            }

            #result_area {

            function detectUserLanguage() {

            }

            /**
             * 安全地獲取 DOM 元素

            function getElement(id) {
                try {
                    return document.getElementById(id);
                } catch (error) {
                    console.warn(`無法獲取元素 ${id}:`, error);
                    return null;
                }
            }

            /**
             * 防抖函數 - 延遲執行函數，避免頻繁調用
             * @param {Function} func - 要防抖的函數
             * @param {number} wait - 等待時間（毫秒）
             * @returns {Function} 防抖後的函數
             */
            function debounce(func, wait) {
                let timeout = null;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func.apply(this, args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            }

            /**

                toast.className = 'copy-success-toast';
                toast.textContent = message;
                toast.setAttribute('role', 'alert');
                toast.setAttribute('aria-live', 'polite');
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'slideIn 0.3s ease-out reverse';
                    setTimeout(() => {
                        if (toast.parentNode) {
                            document.body.removeChild(toast);
                        }
                    }, ANIMATION_DURATION);
                }, duration);
            }

                div.textContent = text;

        function loadSettings() {
            try {
                const savedSettings = localStorage.getItem('milkCalculator_settings');
                if (savedSettings) {
                    const settings = JSON.parse(savedSettings);
                    if (settings.milkAmount) document.getElementById('milk_amount').value = settings.milkAmount;
                    if (settings.hotWaterTemp) document.getElementById('hot_water_temp').value = settings.hotWaterTemp;
                    if (settings.coldWaterTemp) document.getElementById('cold_water_temp').value = settings.coldWaterTemp;
                    return true;
                }
            } catch (e) {
                console.warn('無法載入設定:', e);
            }
            return false;
        }

            // ============================================
            // 複製與分享功能
            // ============================================

            /**
             * 獲取結果區域的文字內容
             * @returns {string|null} 結果文字或 null
             */
            function getResultText() {
                const resultArea = getElement(ELEMENT_IDS.resultArea);
                if (!resultArea) return null;

                const resultText = resultArea.innerText || resultArea.textContent || '';
                const lang = languageData[currentLang];
                const initialPrompt = lang ? lang.initialPrompt : '';

                // 檢查是否為初始提示或空內容
                if (!resultText || resultText.trim() === '' || resultText.includes(initialPrompt)) {
                    return null;
                }

                return resultText;
            }

            /**
             * 使用傳統方法複製文字（fallback）
             * @param {string} text - 要複製的文字
             * @returns {boolean} 是否成功
             */
            function fallbackCopy(text) {
                try {
                    const textArea = document.createElement('textarea');
                    textArea.value = text;
                    textArea.style.position = 'fixed';
                    textArea.style.top = '0';
                    textArea.style.left = '0';
                    textArea.style.opacity = '0';
                    textArea.style.pointerEvents = 'none';
                    document.body.appendChild(textArea);
                    textArea.select();
                    textArea.setSelectionRange(0, text.length);

                    const success = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    return success;
                } catch (error) {
                    console.warn('Fallback 複製失敗:', error);
                    return false;
                }
            }

            /**
             * 複製結果到剪貼板
             */
            async function copyResult() {
                const resultText = getResultText();
                if (!resultText) return;

                const lang = languageData[currentLang];
                if (!lang) return;

                try {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        await navigator.clipboard.writeText(resultText);
                        showToast(lang.copySuccess);
                    } else {
                        if (fallbackCopy(resultText)) {
                            showToast(lang.copySuccess);
                        } else {
                            showToast(lang.shareError);
                        }
                    }
                } catch (error) {
                    console.warn('複製失敗:', error);
                    if (fallbackCopy(resultText)) {
                        showToast(lang.copySuccess);
                    } else {
                        showToast(lang.shareError);
                    }
                }
            }

            /**
             * 分享結果
             */
            async function shareResult() {
                const resultText = getResultText();
                if (!resultText) return;

                const lang = languageData[currentLang];
                if (!lang) return;

                // 確保 URL 包含當前參數
                updateURLParams();
                const shareURL = window.location.href;

                const shareData = {
                    title: lang.appTitle,
                    text: `${lang.appTitle}\n\n${resultText}`,
                    url: shareURL
                };

                try {
                    if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
                        await navigator.share(shareData);
                        showToast(lang.shareSuccess);
                    } else {
                        // Fallback: 複製到剪貼板（包含 URL）
                        const textToCopy = `${resultText}\n\n${shareURL}`;
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            await navigator.clipboard.writeText(textToCopy);
                            showToast(lang.copySuccess);
                        } else {
                            if (fallbackCopy(textToCopy)) {
                                showToast(lang.copySuccess);
                            } else {
                                showToast(lang.shareError);
                            }
                        }
                    }
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        console.warn('分享失敗:', error);
                        showToast(lang.shareError);
                    }
                }
            }

            // ============================================
            // 核心計算邏輯
            // ============================================

            /**
             * 計算混合後的溫度
             * @param {number} hotVolume - 熱水體積 (ml)
             * @param {number} hotTemp - 熱水溫度 (℃)
             * @param {number} coldVolume - 冷水體積 (ml)
             * @param {number} coldTemp - 冷水溫度 (℃)
             * @param {number} totalVolume - 總體積 (ml)
             * @returns {number} 混合後的溫度 (℃)
             */
            function calculateMixedTemperature(hotVolume, hotTemp, coldVolume, coldTemp, totalVolume) {
                if (totalVolume === 0) return 0;
                return (hotVolume * hotTemp + coldVolume * coldTemp) / totalVolume;
            }

            /**
             * 尋找最佳的水量配比
             * @param {number} totalVolume - 總奶量 (ml)
             * @param {number} hotTemp - 熱水溫度 (℃)
             * @param {number} coldTemp - 冷水溫度 (℃)
             * @returns {Object|null} 最佳配比 {hotVolume, coldVolume, temperature} 或 null
             */
            function findOptimalRatio(totalVolume, hotTemp, coldTemp) {
                // 驗證溫度範圍是否可行
                if (TEMP_MIN < coldTemp || TEMP_MAX > hotTemp) {
                    return null;
                }

                let bestHotVolume = 0;
                let bestColdVolume = 0;
                let bestTemperature = 0;
                let minTempDiff = Infinity;

                // 遍歷所有可能的 10ml 倍數組合
                for (let hotVolume = VOLUME_STEP; hotVolume < totalVolume; hotVolume += VOLUME_STEP) {
                    const coldVolume = totalVolume - hotVolume;
                    
                    // 確保冷水也是 10ml 倍數
                    if (coldVolume % VOLUME_STEP !== 0) continue;

                    const mixedTemp = calculateMixedTemperature(
                        hotVolume, hotTemp,
                        coldVolume, coldTemp,
                        totalVolume
                    );

                    // 檢查是否在理想範圍內
                    if (mixedTemp >= TEMP_MIN && mixedTemp <= TEMP_MAX) {
                        const tempDiff = Math.abs(mixedTemp - TEMP_IDEAL);

                        // 選擇最接近理想溫度的配比
                        if (tempDiff < minTempDiff) {
                            minTempDiff = tempDiff;
                            bestHotVolume = hotVolume;
                            bestColdVolume = coldVolume;
                            bestTemperature = mixedTemp;
                        }
                    }
                }

                if (bestHotVolume > 0) {
                    return {
                        hotVolume: bestHotVolume,
                        coldVolume: bestColdVolume,
                        temperature: bestTemperature
                    };
                }

                return null;
            }

            /**
             * 渲染錯誤訊息
             * @param {string} title - 錯誤標題
             * @param {string} message - 錯誤訊息
             * @param {string} suggestion - 建議
             * @returns {string} HTML 字串
             */
            function renderErrorCard(title, message, suggestion) {
                return `
                    <div class="error-card" role="alert">
                        <div class="error-card-title">${escapeHtml(title)}</div>
                        <div class="error-card-message">${escapeHtml(message)}</div>
                        <div class="error-card-suggestion">${escapeHtml(suggestion)}</div>
                    </div>
                `;
            }

            /**
             * 渲染成功結果
             * @param {Object} result - 計算結果
             * @param {number} hotTemp - 熱水溫度
             * @param {number} coldTemp - 冷水溫度
             * @returns {string} HTML 字串
             */
            function renderSuccessResult(result, hotTemp, coldTemp) {
                const lang = languageData[currentLang];
                if (!lang) return '';

                const note = lang.resultRangeNote
                    .replace('{min}', TEMP_MIN)
                    .replace('{max}', TEMP_MAX);
                const hotLabel = lang.resultHot.replace('{temp}', hotTemp);
                const coldLabel = lang.resultCold.replace('{temp}', coldTemp);
                const steps = lang.resultSteps
                    .replace('{hot}', result.hotVolume)
                    .replace('{cold}', result.coldVolume);

                return `
                    <p style="font-size: 1.2em; margin-bottom: 15px; font-weight: 700; color: var(--color-text);">${escapeHtml(lang.resultBest)}</p>
                    <hr style="border: none; border-top: 2px solid rgba(255, 158, 199, 0.3); margin: 15px 0;">
                    <p style="font-size: 1.15em; margin: 14px 0; color: var(--color-text); font-weight: 600;">${escapeHtml(hotLabel)}<strong style="color: var(--color-primary-dark); font-size: 1.6em; font-weight: 800; text-shadow: 0 2px 4px rgba(233, 30, 99, 0.25); letter-spacing: 0.5px; margin-left: 8px; font-family: var(--font-family-mono);">${result.hotVolume} ml</strong></p>
                    <p style="font-size: 1.15em; margin: 14px 0; color: var(--color-text); font-weight: 600;">${escapeHtml(coldLabel)}<strong style="color: var(--color-primary-dark); font-size: 1.6em; font-weight: 800; text-shadow: 0 2px 4px rgba(233, 30, 99, 0.25); letter-spacing: 0.5px; margin-left: 8px; font-family: var(--font-family-mono);">${result.coldVolume} ml</strong></p>
                    <p style="font-size:1.15em; color:#FF6B35; margin-top: 18px; font-weight: 700;">
                        ${escapeHtml(lang.resultActualTemp)}<strong style="color: var(--color-primary-dark); font-size: 1.7em; font-weight: 800; text-shadow: 0 2px 4px rgba(233, 30, 99, 0.25); letter-spacing: 0.5px; margin-left: 8px; font-family: var(--font-family-mono);">${result.temperature.toFixed(1)} ℃</strong>
                    </p>
                    <p style="font-size:0.95em; color:var(--color-text-light); margin-top: 12px; font-weight: 500;">${escapeHtml(note)}</p>
                    <div style="font-size:0.9em; color:var(--color-text); margin-top: 16px; padding: 16px; background: rgba(255, 184, 77, 0.1); border-radius: 12px; line-height: 1.6;">${steps}</div>
                    <div class="result-actions">
                        <button class="result-action-btn" onclick="window.milkCalculator.copyResult()" aria-label="${escapeHtml(lang.copyResult)}">${escapeHtml(lang.copyResult)}</button>
                        <button class="result-action-btn" onclick="window.milkCalculator.shareResult()" aria-label="${escapeHtml(lang.shareResult)}">${escapeHtml(lang.shareResult)}</button>
                    </div>
                `;
            }

            /**
             * 計算並顯示水量配比
             * @param {boolean} isLanguageSwitch - 是否為語言切換觸發
             */
            function calculateWaterAmount(isLanguageSwitch = false) {
                try {
                    const milkAmountEl = getElement(ELEMENT_IDS.milkAmount);
                    const hotWaterTempEl = getElement(ELEMENT_IDS.hotWaterTemp);
                    const coldWaterTempEl = getElement(ELEMENT_IDS.coldWaterTemp);
                    const resultArea = getElement(ELEMENT_IDS.resultArea);

                    if (!milkAmountEl || !hotWaterTempEl || !coldWaterTempEl || !resultArea) {
                        console.error('必要的 DOM 元素不存在');
                        return;
                    }

                    const totalVolume = parseInt(milkAmountEl.value, 10);
                    const hotTemp = parseInt(hotWaterTempEl.value, 10);
                    const coldTemp = parseInt(coldWaterTempEl.value, 10);
                    const lang = languageData[currentLang];

                    if (!lang) {
                        console.error('語言資料不存在');
                        return;
                    }

                    // 驗證輸入值
                    if (isNaN(totalVolume) || isNaN(hotTemp) || isNaN(coldTemp)) {
                        console.error('無效的輸入值');
                        return;
                    }

                    // 保存設定
                    saveSettings();
                    updateURLParams();

                    // 如果是語言切換且當前顯示初始提示，只更新文字
                    if (isLanguageSwitch && resultArea.innerHTML.includes('initialPrompt')) {
                        resultArea.innerHTML = `<p id="initialPrompt">${escapeHtml(lang.initialPrompt)}</p>`;
                        return;
                    }

                    // 檢查溫度範圍是否可行
                    if (TEMP_MIN < coldTemp || TEMP_MAX > hotTemp) {
                        const errorMsg = lang.errorCannotMixMsg
                            .replace('{min}', TEMP_MIN)
                            .replace('{max}', TEMP_MAX);
                        resultArea.innerHTML = renderErrorCard(
                            lang.errorCannotMixTitle,
                            errorMsg,
                            lang.errorCannotMixSuggestion || ''
                        );
                        return;
                    }

                    // 尋找最佳配比
                    const result = findOptimalRatio(totalVolume, hotTemp, coldTemp);

                    if (result) {
                        resultArea.innerHTML = renderSuccessResult(result, hotTemp, coldTemp);
                    } else {
                        const errorMsg = lang.errorNo10xMsg
                            .replace('{min}', TEMP_MIN)
                            .replace('{max}', TEMP_MAX);
                        resultArea.innerHTML = renderErrorCard(
                            lang.errorNo10xTitle,
                            errorMsg,
                            lang.errorNo10xHint || ''
                        );
                    }
                } catch (error) {
                    console.error('計算過程中發生錯誤:', error);
                    const resultArea = getElement(ELEMENT_IDS.resultArea);
                    if (resultArea) {
                        const lang = languageData[currentLang];
                        resultArea.innerHTML = renderErrorCard(
                            lang ? lang.errorCannotMixTitle : '錯誤',
                            '計算過程中發生錯誤，請重新嘗試。',
                            ''
                        );
                    }
                }
            }

            // ============================================
            // 事件處理與初始化
            // ============================================

            /**
             * 初始化表單事件監聽器
             */
            function initializeFormListeners() {
                const milkAmountSelect = getElement(ELEMENT_IDS.milkAmount);
                const hotWaterTempSelect = getElement(ELEMENT_IDS.hotWaterTemp);
                const coldWaterTempSelect = getElement(ELEMENT_IDS.coldWaterTemp);

                if (!milkAmountSelect || !hotWaterTempSelect || !coldWaterTempSelect) {
                    console.error('表單元素不存在');
                    return;
                }

                // 使用防抖機制，避免頻繁計算
                const debouncedCalculate = debounce(calculateWaterAmount, DEBOUNCE_DELAY);

                // 添加 change 事件監聽器
                [milkAmountSelect, hotWaterTempSelect, coldWaterTempSelect].forEach(select => {
                    select.addEventListener('change', debouncedCalculate);

                    // 鍵盤快捷鍵支援
                    select.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            calculateWaterAmount();
                            select.focus();
                        } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                            // 方向鍵選擇後自動計算
                            setTimeout(() => debouncedCalculate(), 100);
                        }
                    });
                });
            }

            /**
             * 初始化安全性提示圖標的鍵盤支援
             */
            function initializeSafetyWarning() {
                // 使用事件委派，因為元素可能被動態更新
                document.addEventListener('keydown', (e) => {
                    const target = e.target;
                    if (target && target.id === ELEMENT_IDS.coldWaterWarning) {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            target.click();
                        }
                    }
                });
            }

            /**
             * 初始化說明區塊的展開狀態
             * @param {boolean} hasUrlParams - 是否有 URL 參數
             */
            function initializeInfoSection(hasUrlParams) {
                const infoToggle = getElement(ELEMENT_IDS.infoToggle);
                const infoContent = getElement(ELEMENT_IDS.infoContent);

                if (infoToggle && infoContent) {
                    if (!hasUrlParams) {
                        // 沒有參數時，預設展開
                        infoToggle.classList.add('expanded');
                        infoContent.classList.add('expanded');
                        infoToggle.setAttribute('aria-expanded', 'true');
                    } else {
                        // 有參數時，預設收起
                        infoToggle.classList.remove('expanded');
                        infoContent.classList.remove('expanded');
                        infoToggle.setAttribute('aria-expanded', 'false');
                    }
                }
            }

            /**
             * 應用程式初始化
             */
            function initialize() {
                try {
                    // 優先載入 URL 參數，如果沒有參數再載入 localStorage
                    const urlParamsLoaded = loadURLParams();
                    let settingsLoaded = false;

                    if (!urlParamsLoaded) {
                        settingsLoaded = loadSettings();
                    }

                    // 初始化說明區塊
                    initializeInfoSection(urlParamsLoaded);

                    // 應用語言設定
                    applyLanguage();

                    // 確保語言切換按鈕文字正確（防止時序問題）
                    setTimeout(() => {
                        const toggleButton = getElement(ELEMENT_IDS.languageToggle);
                        if (toggleButton) {
                            toggleButton.textContent = currentLang === 'zh' ? 'English' : '中文';
                        }
                    }, 100);

                    // 初始化表單事件監聽器
                    initializeFormListeners();

                    // 初始化安全性提示
                    initializeSafetyWarning();

                    // 初始化說明內容
                    updateInfoContent();

                    // 如果載入了設定或 URL 參數，觸發一次計算
                    if (settingsLoaded || urlParamsLoaded) {
                        setTimeout(() => calculateWaterAmount(), 100);
                    }
                } catch (error) {
                    console.error('初始化失敗:', error);
                }
            }

            // ============================================
            // 公開 API（供 HTML onclick 使用）
            // ============================================
            window.milkCalculator = {
                switchLanguage,
                toggleInfo,
                copyResult,
                shareResult,
                calculateWaterAmount
            };

            // 初始化應用程式
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initialize);
            } else {
                // DOM 已經載入完成
                initialize();
            }
        })();
    </script>

</body>
</html>
