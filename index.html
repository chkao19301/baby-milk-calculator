<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="appTitle">🍼 奶粉沖泡計算機 (10倍數)</title>
    <style>
        /* 基礎樣式與手機優化 - 暗色系調整 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #212529; /* 深灰色背景 */
            color: #f8f9fa; /* 淺白色文字 */
            min-height: 100vh;
        }

        .calculator-container {
            background-color: #343a40; /* 較淺的深灰色容器 */
            padding: 25px;
            padding-top: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4); /* 更明顯的陰影 */
            position: relative;
            max-width: 100%;
            margin: 0 auto;
        }

        /* 語言切換按鈕樣式 */
        #language-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            
            padding: 5px 10px; 
            font-size: 0.8em; 
            
            background-color: #007bff; /* 沉穩藍色 */
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #language-toggle:hover {
            background-color: #0056b3;
        }

        /* 標題樣式 */
        h1 {
            color: #90ee90; /* 柔和的淺綠色標題 */
            text-align: center;
            margin-top: 20px; 
            margin-bottom: 30px; 
            font-size: 1.8em;
            padding-right: 70px;
            padding-left: 10px;
        }

        /* 欄位群組 */
        .form-group {
            margin-bottom: 20px;
        }

        /* 標籤樣式 */
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 1.1em;
            color: #adb5bd; /* 柔和的灰色標籤 */
        }

        /* 下拉式選單樣式 */
        select {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid #495057; /* 深色邊框 */
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1.1em;
            background-color: #495057; /* 比容器稍深的背景 */
            color: #f8f9fa; /* 淺色文字 */
            min-height: 48px; 
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 1em;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #ced4da; /* 淺色箭頭 */
        }

        /* 計算按鈕樣式 */
        button:not(#language-toggle) { 
            width: 100%;
            padding: 15px;
            background-color: #28a745; /* 沉穩的綠色按鈕 */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:not(#language-toggle):hover {
            background-color: #1e7e34;
        }

        /* 結果顯示區 */
        #result_area {
            margin-top: 30px;
            padding: 15px;
            border: 2px dashed #007bff; /* 藍色虛線強調 */
            border-radius: 8px;
            text-align: center;
            background-color: #495057; /* 與選單背景色一致 */
            min-height: 100px;
        }

        #result_area p {
            font-size: 1.1em;
            font-weight: bold;
            margin: 10px 0;
            color: #f8f9fa;
        }
        #result_area strong {
            font-size: 1.4em;
            color: #ffc107; /* 黃色強調結果數值 */
        }

        /* 冷水提示樣式 - 醒目設計 */
        .cold-water-warning {
            display: inline-block;
            margin-left: 10px;
            padding: 6px 12px;
            background-color: #ff6b35; /* 醒目的橙紅色背景 */
            color: #ffffff;
            font-size: 0.9em;
            font-weight: bold;
            border-radius: 6px;
            border: 2px solid #ff4500; /* 深橙色邊框 */
            box-shadow: 0 2px 8px rgba(255, 107, 53, 0.5);
            animation: pulse 2s infinite;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.02);
            }
        }

        /* 響應式設計 - 電腦版 (平板和桌面) */
        @media (min-width: 768px) {
            body {
                padding: 40px;
            }

            .calculator-container {
                max-width: 600px;
                padding: 35px;
                padding-top: 30px;
            }

            h1 {
                font-size: 2.2em;
                margin-bottom: 40px;
            }

            label {
                font-size: 1.2em;
            }

            select {
                font-size: 1.15em;
                padding: 14px 12px;
            }

            button:not(#language-toggle) {
                font-size: 1.3em;
                padding: 18px;
            }

            #result_area {
                padding: 20px;
                min-height: 120px;
            }

            #result_area p {
                font-size: 1.2em;
            }

            #result_area strong {
                font-size: 1.5em;
            }

            .cold-water-warning {
                font-size: 1em;
                padding: 8px 14px;
                margin-left: 12px;
            }
        }

        /* 響應式設計 - 手機版 */
        @media (max-width: 767px) {
            body {
                padding: 15px;
            }

            .calculator-container {
                padding: 20px;
                padding-top: 60px; /* 為語言切換按鈕留出空間 */
                border-radius: 10px;
            }

            /* 語言切換按鈕在手機上的調整 */
            #language-toggle {
                top: 15px;
                right: 15px;
                padding: 8px 12px;
                font-size: 0.9em;
            }

            h1 {
                font-size: 1.5em;
                margin-top: 10px;
                margin-bottom: 25px;
                padding-right: 80px; /* 為語言按鈕留出空間 */
                padding-left: 0;
            }

            .form-group {
                margin-bottom: 18px;
            }

            label {
                font-size: 1em;
                margin-bottom: 6px;
            }

            select {
                font-size: 1em;
                padding: 14px 10px;
                min-height: 48px; /* 確保觸控友善 */
            }

            button:not(#language-toggle) {
                font-size: 1.1em;
                padding: 16px;
                margin-top: 15px;
            }

            #result_area {
                margin-top: 25px;
                padding: 15px;
                min-height: 90px;
            }

            #result_area p {
                font-size: 1em;
                margin: 8px 0;
            }

            #result_area strong {
                font-size: 1.3em;
            }

            .cold-water-warning {
                font-size: 0.8em;
                padding: 5px 10px;
                margin-left: 8px;
                border-width: 1.5px;
            }
        }

        /* 超小螢幕手機 (小於 360px) */
        @media (max-width: 359px) {
            body {
                padding: 10px;
            }

            .calculator-container {
                padding: 15px;
                padding-top: 55px;
            }

            h1 {
                font-size: 1.3em;
                padding-right: 70px;
            }

            label {
                font-size: 0.95em;
            }

            select {
                font-size: 0.95em;
            }

            button:not(#language-toggle) {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        
        <button id="language-toggle" onclick="switchLanguage()">English</button>

        <h1 id="mainTitle">👶 奶粉沖泡水量計算 (10ml 單位)</h1>

        <div class="form-group">
            <label id="labelMilkAmount" for="milk_amount">總奶量 (ml):</label>
            <div class="select-wrapper">
                <select id="milk_amount" name="milk_amount">
                    <option value="120">120 ml</option>
                    <option value="150">150 ml</option>
                    <option value="180" selected>180 ml</option>
                    <option value="210">210 ml</option>
                    <option value="240">240 ml</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label id="labelHotWater" for="hot_water_temp">熱水溫度 (℃):</label>
            <div class="select-wrapper">
                <select id="hot_water_temp" name="hot_water_temp">
                    <option value="70">70 ℃</option>
                    <option value="80" selected>80 ℃</option>
                    <option value="90">90 ℃</option>
                    <option value="100">100 ℃</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label id="labelColdWater" for="cold_water_temp">冷水溫度 (℃):<span id="coldWaterWarning" class="cold-water-warning">⚠️ 必須使用符合衛生標準的水</span></label>
            <div class="select-wrapper">
                <select id="cold_water_temp" name="cold_water_temp">
                    <option value="16">16 ℃</option>
                    <option value="18">18 ℃</option>
                    <option value="20" selected>20 ℃</option>
                    <option value="22">22 ℃</option>
                    <option value="24">24 ℃</option>
                    <option value="26">26 ℃</option>
                </select>
            </div>
        </div>

        <button id="calculateButton" onclick="calculateWaterAmount()">
            計算最佳 10ml 倍數配比
        </button>
        
        <div id="result_area">
            <p id="initialPrompt">請選擇上方參數並點擊「計算」</p>
        </div>
        
    </div>

    <script>
        // --- JavaScript 保持不變 ---
        const languageData = {
            'zh': {
                appTitle: '🍼 奶粉沖泡計算機 (10倍數)',
                mainTitle: '👶 奶粉沖泡水量計算 (10ml 單位)',
                labelMilkAmount: '總奶量 (ml):',
                labelHotWater: '熱水溫度 (℃):',
                labelColdWater: '冷水溫度 (℃):',
                coldWaterWarning: '⚠️ 必須使用符合衛生標準的水',
                calculateButton: '計算最佳 10ml 倍數配比',
                initialPrompt: '請選擇上方參數並點擊「計算」',
                resultBest: '最佳調配結果 (10ml 單位):',
                resultHot: '熱水 ({temp}℃) 需要：',
                resultCold: '冷水 ({temp}℃) 需要：',
                resultActualTemp: '混合後實際溫度約：',
                resultRangeNote: '(落在目標範圍 {min}~{max}℃ 內)',
                errorCannotMixTitle: '❌ 錯誤',
                errorCannotMixMsg: '您的熱水 ({Th}℃) 或冷水 ({Tc}℃) 無法調配出 {min}~{max}℃ 的水。',
                errorNo10xTitle: '⚠️ 注意',
                errorNo10xMsg: '在 10ml 倍數的限制下，找不到能準確落在 {min}~{max}℃ 範圍內的組合。',
                errorNo10xHint: '請嘗試更改熱水或冷水的溫度設定。'
            },
            'en': {
                appTitle: '🍼 Formula Water Calculator (10x Multiples)',
                mainTitle: '👶 Formula Water Calculation (10ml Units)',
                labelMilkAmount: 'Total Volume (ml):',
                labelHotWater: 'Hot Water Temp. (℃):',
                labelColdWater: 'Cold Water Temp. (℃):',
                coldWaterWarning: '⚠️ Must use water that meets hygiene standards',
                calculateButton: 'Calculate Optimal 10ml Ratio',
                initialPrompt: 'Please select parameters and click "Calculate"',
                resultBest: 'Optimal Mixing Ratio (10ml units):',
                resultHot: 'Hot Water ({temp}℃) required:',
                resultCold: 'Cold Water ({temp}℃) required:',
                resultActualTemp: 'Actual Mixed Temp. approx.:',
                resultRangeNote: '(Within target range {min}~{max}℃)',
                errorCannotMixTitle: '❌ Error',
                errorCannotMixMsg: 'Your hot water ({Th}℃) or cold water ({Tc}℃) cannot mix water between {min}~{max}℃.',
                errorNo10xTitle: '⚠️ Warning',
                errorNo10xMsg: 'No 10ml multiple combination found to be accurately within the {min}~{max}℃ range.',
                errorNo10xHint: 'Please try changing the hot or cold water temperature settings.'
            }
        };

        // 檢測使用者瀏覽器的預設語言
        function detectUserLanguage() {
            const browserLang = navigator.language || navigator.userLanguage;
            // 檢查是否為中文（包括 zh、zh-TW、zh-CN、zh-HK 等）
            if (browserLang.toLowerCase().startsWith('zh')) {
                return 'zh';
            }
            return 'en';
        }

        let currentLang = detectUserLanguage(); 

        function switchLanguage() {
            currentLang = (currentLang === 'zh') ? 'en' : 'zh';
            applyLanguage();
        }

        function applyLanguage() {
            const lang = languageData[currentLang];
            
            // 安全地更新所有元素，添加 null 檢查
            const appTitleEl = document.getElementById('appTitle');
            if (appTitleEl) appTitleEl.textContent = lang.appTitle;
            
            const mainTitleEl = document.getElementById('mainTitle');
            if (mainTitleEl) mainTitleEl.textContent = lang.mainTitle;
            
            const labelMilkAmountEl = document.getElementById('labelMilkAmount');
            if (labelMilkAmountEl) labelMilkAmountEl.textContent = lang.labelMilkAmount;
            
            const labelHotWaterEl = document.getElementById('labelHotWater');
            if (labelHotWaterEl) labelHotWaterEl.textContent = lang.labelHotWater;
            
            const labelColdWaterEl = document.getElementById('labelColdWater');
            if (labelColdWaterEl) {
                // 使用 innerHTML 同時設置 label 文字和提示，確保提示元素始終存在
                labelColdWaterEl.innerHTML = lang.labelColdWater + '<span id="coldWaterWarning" class="cold-water-warning">' + lang.coldWaterWarning + '</span>';
            }
            
            const calculateButtonEl = document.getElementById('calculateButton');
            if (calculateButtonEl) calculateButtonEl.textContent = lang.calculateButton;
            
            // 更新語言切換按鈕文字：目前是中文時顯示"English"，目前是英文時顯示"中文"
            const toggleButton = document.getElementById('language-toggle');
            if (toggleButton) {
                toggleButton.textContent = (currentLang === 'zh') ? 'English' : '中文';
            }
            
            calculateWaterAmount(true); 
        }

        function calculateWaterAmount(isLanguageSwitch = false) {
            const totalVolume = parseInt(document.getElementById('milk_amount').value);
            const Th = parseInt(document.getElementById('hot_water_temp').value);
            const Tc = parseInt(document.getElementById('cold_water_temp').value);
            const T_min = 42;
            const T_max = 48;
            const T_ideal = 45;
            const resultArea = document.getElementById('result_area');
            const lang = languageData[currentLang];

            if (isLanguageSwitch && resultArea.innerHTML.includes('initialPrompt')) {
                resultArea.innerHTML = `<p id="initialPrompt">${lang.initialPrompt}</p>`;
                return;
            }

            let bestVh = 0;
            let bestVc = 0;
            let closestTemp = 0;
            let minTempDiff = Infinity; 

            if (T_min < Tc || T_max > Th) {
                let errorMsg = lang.errorCannotMixMsg.replace('{Th}', Th).replace('{Tc}', Tc).replace('{min}', T_min).replace('{max}', T_max);
                resultArea.innerHTML = `<p style="color:#d32f2f;">${lang.errorCannotMixTitle}</p>
                                        <p>${errorMsg}</p>`;
                return;
            }

            for (let Vh_try = 10; Vh_try < totalVolume; Vh_try += 10) {
                const Vc_try = totalVolume - Vh_try;
                if (Vc_try % 10 !== 0) continue; 
                
                const Tm_actual = (Vh_try * Th + Vc_try * Tc) / totalVolume;

                if (Tm_actual >= T_min && Tm_actual <= T_max) {
                    const tempDiff = Math.abs(Tm_actual - T_ideal);
                    
                    if (tempDiff < minTempDiff) {
                        minTempDiff = tempDiff;
                        bestVh = Vh_try;
                        bestVc = Vc_try;
                        closestTemp = Tm_actual;
                    }
                }
            }

            if (bestVh > 0) {
                let note = lang.resultRangeNote.replace('{min}', T_min).replace('{max}', T_max);
                let hotLabel = lang.resultHot.replace('{temp}', Th);
                let coldLabel = lang.resultCold.replace('{temp}', Tc);

                resultArea.innerHTML = `
                    <p>${lang.resultBest}</p>
                    <hr style="border-color: #007bff;">
                    <p>${hotLabel}<strong>${bestVh} ml</strong></p>
                    <p>${coldLabel}<strong>${bestVc} ml</strong></p>
                    <p style="font-size:1em; color:#ffc107;">
                        ${lang.resultActualTemp}<strong>${closestTemp.toFixed(1)} ℃</strong>
                    </p>
                    <p style="font-size:0.9em; color:#adb5bd;">${note}</p>
                `;
            } else {
                 let errorMsg = lang.errorNo10xMsg.replace('{min}', T_min).replace('{max}', T_max);
                resultArea.innerHTML = `<p style="color:#d32f2f;">${lang.errorNo10xTitle}</p>
                                        <p>${errorMsg}</p>
                                        <p style="font-size:0.9em; color:#adb5bd;">${lang.errorNo10xHint}</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 確保按鈕文字正確更新
            applyLanguage();
            // 再次確認按鈕文字（防止時序問題）
            setTimeout(() => {
                const toggleButton = document.getElementById('language-toggle');
                if (toggleButton) {
                    if (currentLang === 'zh') {
                        toggleButton.textContent = 'English';
                    } else {
                        toggleButton.textContent = '中文';
                    }
                }
            }, 100);
        });
    </script>

</body>
</html>
